<style>
/* ============================================
   OI COREIA — Design Tokens
   ============================================ */
:root{
  --cream:#FBF6EF;
  --cream-deep:#F3EBDD;
  --white:#FFFFFF;
  --sakura:#F4B8C4;
  --sakura-deep:#E8889A;
  --sage:#A8C3A0;
  --sage-deep:#7FA377;
  --peach:#F0A98E;
  --sky:#9FC9E8;
  --ink:#3A332E;
  --ink-soft:#6B6259;
  --ink-faint:#A39A8F;
  --gold:#E8B95F;

  --font-display:'Fredoka', sans-serif;
  --font-body:'Poppins', sans-serif;

  --r-sm:16px;
  --r-md:24px;
  --r-lg:32px;
  --r-xl:40px;

  --shadow-card: 0 4px 16px rgba(58,51,46,0.06), 0 1px 3px rgba(58,51,46,0.04);
  --shadow-float: 0 12px 32px rgba(58,51,46,0.12), 0 4px 8px rgba(58,51,46,0.06);
  --shadow-press: 0 2px 8px rgba(58,51,46,0.08);
}

*{box-sizing:border-box; margin:0; padding:0;}
html,body{height:100%;}
body{
  font-family:var(--font-body);
  background:var(--cream);
  color:var(--ink);
  overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
  -webkit-tap-highlight-color:transparent;
  user-select:none;
}
button{font-family:inherit; border:none; background:none; cursor:pointer; -webkit-tap-highlight-color:transparent;}
input{font-family:inherit;}
img,svg{display:block;}

@media (prefers-reduced-motion: reduce){
  *{animation-duration:0.01ms !important; animation-iteration-count:1 !important; transition-duration:0.01ms !important;}
}

#app{
  max-width:480px;
  margin:0 auto;
  min-height:100vh;
  position:relative;
  background:var(--cream);
  display:flex;
  flex-direction:column;
}

.screen{
  flex:1;
  display:flex;
  flex-direction:column;
  position:relative;
  min-height:100vh;
  animation:screenIn 0.45s cubic-bezier(0.16,1,0.3,1);
}
@keyframes screenIn{from{opacity:0; transform:translateY(12px);} to{opacity:1; transform:translateY(0);}}
.screen.hidden{display:none;}

.petals-bg{
  position:fixed;
  inset:0;
  pointer-events:none;
  overflow:hidden;
  z-index:0;
  max-width:480px;
  margin:0 auto;
}
.petal{
  position:absolute;
  top:-40px;
  font-size:18px;
  opacity:0.5;
  animation:fall linear infinite;
  filter:drop-shadow(0 1px 2px rgba(58,51,46,0.05));
}
@keyframes fall{
  0%{transform:translateY(0) translateX(0) rotate(0deg); opacity:0;}
  10%{opacity:0.55;}
  90%{opacity:0.4;}
  100%{transform:translateY(110vh) translateX(var(--drift,20px)) rotate(360deg); opacity:0;}
}

.korean{font-family:var(--font-display); font-weight:700; color:var(--ink); line-height:1.25;}
.eyebrow{
  font-family:var(--font-body);
  font-weight:600;
  font-size:13px;
  letter-spacing:0.06em;
  text-transform:uppercase;
  color:var(--ink-faint);
}

.btn{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  font-weight:700;
  font-size:18px;
  border-radius:999px;
  padding:18px 32px;
  transition:transform 0.15s ease, box-shadow 0.15s ease, filter 0.15s ease;
  box-shadow:var(--shadow-card);
}
.btn:active{transform:scale(0.96); box-shadow:var(--shadow-press);}
.btn-primary{background:linear-gradient(135deg, var(--sakura-deep), var(--peach)); color:var(--white);}
.btn-secondary{background:var(--white); color:var(--ink); border:2px solid var(--cream-deep);}
.btn-sage{background:linear-gradient(135deg, var(--sage-deep), var(--sage)); color:var(--white);}
.btn-block{width:100%;}
.btn-ghost{background:transparent; color:var(--ink-soft); font-weight:600; padding:12px 20px;}

.card{background:var(--white); border-radius:var(--r-lg); box-shadow:var(--shadow-card);}

.splash{
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:40px;
  position:relative;
  z-index:1;
}
.splash-mark{font-size:64px; margin-bottom:20px; animation:splashFloat 3s ease-in-out infinite;}
@keyframes splashFloat{0%,100%{transform:translateY(0) rotate(-4deg);} 50%{transform:translateY(-10px) rotate(4deg);}}
.splash-logo{font-family:var(--font-display); font-size:44px; font-weight:700; color:var(--ink); margin-bottom:10px;}
.splash-logo span{color:var(--sakura-deep);}
.splash-sub{font-size:17px; color:var(--ink-soft); font-weight:500; margin-bottom:56px;}
.splash .btn{margin-top:8px; min-width:220px;}

.onboard{
  align-items:center;
  justify-content:center;
  padding:32px;
  text-align:center;
  position:relative;
  z-index:1;
}
.onboard-emoji{font-size:56px; margin-bottom:24px;}
.onboard-title{font-family:var(--font-display); font-size:28px; font-weight:700; margin-bottom:12px; line-height:1.35;}
.onboard-desc{font-size:16px; color:var(--ink-soft); margin-bottom:36px; line-height:1.5;}
.onboard-input{
  width:100%;
  max-width:320px;
  padding:18px 24px;
  border-radius:999px;
  border:2px solid var(--cream-deep);
  background:var(--white);
  font-size:18px;
  font-weight:600;
  text-align:center;
  color:var(--ink);
  margin-bottom:28px;
  transition:border-color 0.2s ease;
}
.onboard-input:focus{outline:none; border-color:var(--sakura);}
.onboard-input::placeholder{color:var(--ink-faint); font-weight:500;}
.onboard .btn{min-width:220px;}

.topbar{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:18px 20px 8px;
  position:relative;
  z-index:1;
}
.topbar-back{
  width:42px; height:42px;
  border-radius:50%;
  background:var(--white);
  display:flex; align-items:center; justify-content:center;
  box-shadow:var(--shadow-card);
  font-size:18px;
  color:var(--ink-soft);
}
.topbar-title{font-family:var(--font-display); font-weight:700; font-size:20px;}
.topbar-spacer{width:42px;}

.home{padding:8px 20px 100px; position:relative; z-index:1;}
.home-greet{margin:18px 0 6px;}
.home-greet-text{font-family:var(--font-display); font-size:26px; font-weight:700; line-height:1.3;}
.home-greet-sub{font-size:15px; color:var(--ink-soft); margin-top:4px; font-weight:500;}

/* Botão de entrada instantânea — "sentei no sofá, já quero treinar, sem escolher nada" */
.quick-train-cta{
  width:100%;
  display:flex;
  align-items:center;
  gap:14px;
  background:linear-gradient(135deg, var(--sakura-deep), var(--peach));
  border:none;
  border-radius:var(--r-lg);
  padding:18px 18px;
  margin:16px 0 4px;
  box-shadow:0 6px 18px rgba(232,136,154,0.35);
  cursor:pointer;
  text-align:left;
  font-family:inherit;
  transition:transform 0.15s ease, box-shadow 0.15s ease;
}
.quick-train-cta:active{
  transform:scale(0.98);
  box-shadow:0 3px 10px rgba(232,136,154,0.3);
}
.quick-train-cta-icon{
  font-size:26px;
  width:48px;
  height:48px;
  flex-shrink:0;
  display:flex;
  align-items:center;
  justify-content:center;
  background:rgba(255,255,255,0.3);
  border-radius:50%;
}
.quick-train-cta-text{flex:1;}
.quick-train-cta-title{
  font-family:var(--font-display);
  font-size:18px;
  font-weight:700;
  color:var(--white);
}
.quick-train-cta-sub{
  font-size:12.5px;
  font-weight:600;
  color:rgba(255,255,255,0.92);
  margin-top:2px;
  line-height:1.3;
}
.quick-train-cta-arrow{
  font-size:24px;
  color:rgba(255,255,255,0.85);
  flex-shrink:0;
}
.stats-row{display:grid; grid-template-columns:1fr 1fr; gap:12px; margin:22px 0;}

/* ===== CEREJEIRA ===== */
.sakura-card{
  background:linear-gradient(170deg, #FFF8FB 0%, #FBF6EF 100%);
  border-radius:var(--r-xl);
  box-shadow:var(--shadow-card);
  padding:20px 16px 16px;
  margin:0 0 18px;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:10px;
  overflow:hidden;
  position:relative;
}
.sakura-tree-wrap{
  width:100%;
  display:flex;
  justify-content:center;
}
.sakura-tree-wrap svg{
  display:block;
  max-width:300px;
  width:100%;
  animation: sakuraSway 6s ease-in-out infinite;
  transform-origin:50% 100%;
}
@keyframes sakuraSway{
  0%, 100%{ transform:rotate(-0.6deg); }
  50%{ transform:rotate(0.6deg); }
}
/* Cada flor pulsa bem de leve, de forma independente (delay via --d definido inline) */
.sakura-bloom{
  animation: sakuraPulse 3.2s ease-in-out infinite;
  animation-delay:var(--d, 0s);
  transform-box:fill-box;
  transform-origin:center;
}
@keyframes sakuraPulse{
  0%, 100%{ transform:scale(1); }
  50%{ transform:scale(1.06); }
}
/* Pétala caindo: desce e oscila lateralmente, num loop contínuo */
.sakura-falling{
  animation: sakuraFall var(--fdur, 7s) linear infinite;
  animation-delay:var(--fdelay, 0s);
}
@keyframes sakuraFall{
  0%{ transform:translate(0,0) rotate(0deg); opacity:0; }
  8%{ opacity:var(--fop, 0.5); }
  92%{ opacity:var(--fop, 0.5); }
  100%{ transform:translate(var(--fx, 12px), var(--fy, 60px)) rotate(140deg); opacity:0; }
}
.sakura-phrase{
  font-size:13px;
  font-weight:600;
  color:var(--ink-soft);
  text-align:center;
  line-height:1.45;
  min-height:20px;
}

.stat-card{background:var(--white); border-radius:var(--r-md); padding:18px 16px; box-shadow:var(--shadow-card); text-align:center;}
.stat-emoji{font-size:26px; margin-bottom:6px;}
.stat-value{font-size:24px; font-weight:800; color:var(--ink);}
.stat-label{font-size:12px; color:var(--ink-soft); font-weight:600; margin-top:2px;}

.next-dest{
  background:linear-gradient(135deg, #FFF8F0, var(--white));
  border-radius:var(--r-lg);
  padding:20px;
  box-shadow:var(--shadow-card);
  margin-bottom:24px;
  display:flex;
  align-items:center;
  gap:16px;
}
.next-dest-emoji{font-size:38px;}
.next-dest-label{font-size:12px; font-weight:700; color:var(--ink-faint); text-transform:uppercase; letter-spacing:0.05em;}
.next-dest-name{font-family:var(--font-display); font-size:19px; font-weight:700; margin-top:2px;}
.next-dest-progress{margin-top:8px; height:8px; background:var(--cream-deep); border-radius:999px; overflow:hidden;}
.next-dest-progress-fill{height:100%; background:linear-gradient(90deg, var(--sakura), var(--sakura-deep)); border-radius:999px; transition:width 0.6s cubic-bezier(0.16,1,0.3,1);}

.section-label{font-family:var(--font-body); font-weight:700; font-size:15px; color:var(--ink); margin:8px 0 14px;}
.theme-scroll{
  display:flex;
  gap:14px;
  overflow-x:auto;
  padding-bottom:8px;
  margin:0 -20px;
  padding-left:20px;
  padding-right:20px;
}
.theme-card{
  flex:0 0 auto;
  width:148px;
  background:var(--white);
  border-radius:var(--r-md);
  padding:20px 16px;
  box-shadow:var(--shadow-card);
  text-align:center;
  position:relative;
  transition:transform 0.15s ease;
}
.theme-card:active{transform:scale(0.95);}
.theme-card.locked{opacity:0.55;}
.theme-card-emoji{font-size:36px; margin-bottom:10px;}
.theme-card-name{font-size:14px; font-weight:700; line-height:1.3;}
.theme-card-meta{font-size:11px; color:var(--ink-soft); margin-top:4px; font-weight:600;}
.theme-card-lock{position:absolute; top:10px; right:10px; font-size:14px;}

.bottom-nav{
  position:fixed;
  bottom:0; left:0; right:0;
  max-width:480px;
  margin:0 auto;
  background:rgba(255,255,255,0.92);
  backdrop-filter:blur(12px);
  display:flex;
  justify-content:space-around;
  padding:10px 8px calc(10px + env(safe-area-inset-bottom));
  box-shadow:0 -2px 16px rgba(58,51,46,0.07);
  z-index:10;
}
.nav-item{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:3px;
  padding:6px 18px;
  border-radius:16px;
  color:var(--ink-faint);
  font-size:11px;
  font-weight:600;
  transition:color 0.2s ease;
}
.nav-item.active{color:var(--sakura-deep);}
.nav-item-icon{font-size:21px;}

.themes-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px;
  padding:8px 20px 40px;
  position:relative;
  z-index:1;
}
.theme-tile{
  background:var(--white);
  border-radius:var(--r-lg);
  padding:24px 16px;
  text-align:center;
  box-shadow:var(--shadow-card);
  position:relative;
  transition:transform 0.15s ease;
}
.theme-tile:active{transform:scale(0.95);}
.theme-tile.locked{opacity:0.5;}
.theme-tile-emoji{font-size:42px; margin-bottom:12px;}
.theme-tile-name{font-family:var(--font-display); font-size:17px; font-weight:700;}
.theme-tile-count{font-size:12px; color:var(--ink-soft); margin-top:6px; font-weight:600;}
.theme-tile-lockbadge{
  margin-top:8px;
  font-size:11px;
  font-weight:700;
  color:var(--sakura-deep);
  background:#FFF0F3;
  border-radius:999px;
  padding:4px 10px;
  display:inline-block;
}

/* ============================================
   TELA MATCH — AJUSTADA
   ============================================ */
.match-screen{
  padding:0 18px 24px;
  position:relative;
  z-index:1;
  display:flex;
  flex-direction:column;
  flex:1;
}
.match-progress{display:flex; align-items:center; gap:10px; padding:14px 2px 18px;}
.match-progress-track{flex:1; height:10px; background:var(--cream-deep); border-radius:999px; overflow:hidden;}
.match-progress-fill{height:100%; background:linear-gradient(90deg, var(--sage), var(--sage-deep)); border-radius:999px; transition:width 0.5s cubic-bezier(0.16,1,0.3,1);}
.match-progress-count{font-size:13px; font-weight:700; color:var(--ink-soft); white-space:nowrap;}
.match-close{
  width:38px; height:38px;
  border-radius:50%;
  background:var(--white);
  box-shadow:var(--shadow-card);
  display:flex; align-items:center; justify-content:center;
  font-size:16px;
  color:var(--ink-soft);
}

.match-board{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px;
  flex:1;
  align-content:start;
}
.match-col{display:flex; flex-direction:column; gap:12px;}

.match-card{
  background:var(--white);
  border-radius:26px;
  padding:16px 12px;
  box-shadow:var(--shadow-card);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  min-height:112px;
  position:relative;
  transition:transform 0.18s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.18s ease, background 0.2s ease, opacity 0.3s ease;
  border:2px solid transparent;
  overflow:hidden;
  box-sizing:border-box;
}

.match-card.kr{
  font-family:var(--font-display);
  font-weight:700;
  gap:8px;
  line-height:1.15;
  word-break:keep-all;
  overflow-wrap:normal;
  line-break:strict;
  hyphens:none;
  text-wrap:balance;
  padding-left:6px;
  padding-right:6px;
}
/* Tipografia adaptativa: o tamanho da fonte se ajusta ao comprimento do texto
   pra nunca quebrar sílabas Hangul no meio nem ultrapassar o card. */
.match-card.kr.kr-short{font-size:44px;}   /* até 3 caracteres */
.match-card.kr.kr-medium{font-size:38px;}  /* até 5 caracteres */
.match-card.kr.kr-long{font-size:32px;}    /* até 7 caracteres */
.match-card.kr.kr-phrase{font-size:25px; line-height:1.25;} /* frases, mais de 7 caracteres */

.match-card.pt{
  font-size:17px;
  font-weight:800;
  color:var(--ink);
  line-height:1.22;
  padding-left:10px;
  padding-right:10px;
  word-break:normal;
  overflow-wrap:anywhere;
  hyphens:auto;
}
/* Tipografia adaptativa PT: reduz fonte quando tradução é longa, evitando overflow */
.match-card.pt.pt-medium{font-size:15px;}
.match-card.pt.pt-long{font-size:13px; line-height:1.28;}
.match-card.pt.pt-xlong{font-size:12px; line-height:1.3;}

.match-card.kr:nth-child(1){background:#FFF0F4;}
.match-card.kr:nth-child(2){background:#FFF7D8;}
.match-card.kr:nth-child(3){background:#EEF7EA;}
.match-card.kr:nth-child(4){background:#EAF5FF;}
.match-card.kr:nth-child(5){background:#F3ECFF;}

.match-card:active:not(.matched):not(.disabled){transform:scale(0.94);}
.match-card.selected{
  border-color:var(--sakura-deep);
  box-shadow:var(--shadow-float);
  background:#FFF7F9;
}
/* Acerto: flash verde e depois some */
.match-card.matched{
  background:#4CAF50;
  border-color:#388E3C;
  color:var(--white);
  transition: background 0.08s ease, transform 0.25s ease, opacity 0.25s ease;
  opacity:0;
  pointer-events:none;
  transform:scale(0.88);
}
/* Erro: fundo vermelho + shake */
.match-card.wrong{
  background:#FFEBEE !important;
  border-color:#E57373 !important;
  animation:shakeCard 0.38s ease;
}
@keyframes shakeCard{0%,100%{transform:translateX(0);} 22%{transform:translateX(-7px);} 55%{transform:translateX(7px);} 78%{transform:translateX(-4px);}}

.match-card-audio{
  width:34px;
  height:34px;
  border-radius:50%;
  background:linear-gradient(135deg, var(--sakura-deep), var(--peach));
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:14px;
  font-family:var(--font-body);
  font-weight:800;
  line-height:1;
  box-shadow:0 4px 10px rgba(232,136,154,0.25);
  flex-shrink:0;
}

/* match-feedback removido: feedback é agora por cor (verde/vermelho) e som, não por texto a cada acerto */

.burst-petal{
  position:fixed;
  pointer-events:none;
  z-index:99;
  animation:burstOut 0.8s cubic-bezier(0.16,1,0.3,1) forwards;
}
@keyframes burstOut{
  0%  {transform:translate(0,0) scale(0.5) rotate(0deg); opacity:1;}
  100%{transform:translate(var(--bx,0px), var(--by,-120px)) scale(1.3) rotate(var(--br,200deg)); opacity:0;}
}

.complete-screen{
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:32px;
  position:relative;
  z-index:1;
}
.complete-emoji{font-size:72px; margin-bottom:18px; animation:completePop 0.6s cubic-bezier(0.34,1.56,0.64,1);}
@keyframes completePop{0%{transform:scale(0); opacity:0;} 60%{transform:scale(1.15);} 100%{transform:scale(1); opacity:1;}}
.complete-title{font-family:var(--font-display); font-size:26px; font-weight:700; margin-bottom:10px;}
.complete-desc{font-size:16px; color:var(--ink-soft); margin-bottom:28px; line-height:1.5;}

.complete-accuracy{
  display:inline-flex;
  align-items:baseline;
  gap:8px;
  background:var(--white);
  border:1.5px solid var(--cream-deep);
  border-radius:999px;
  padding:8px 18px;
  margin-bottom:18px;
}
.complete-accuracy-pct{
  font-family:var(--font-display);
  font-size:19px;
  font-weight:700;
  color:var(--sage-deep);
}
.complete-accuracy-label{
  font-size:12.5px;
  font-weight:600;
  color:var(--ink-soft);
}

.complete-flowers{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  font-family:var(--font-display);
  font-size:22px;
  font-weight:700;
  color:var(--sakura-deep);
  background:#FFF0F3;
  padding:14px 26px;
  border-radius:999px;
  margin-bottom:32px;
}
.complete-words{display:flex; flex-wrap:wrap; gap:10px; justify-content:center; margin-bottom:32px; max-width:340px;}
.complete-word-chip{
  background:var(--white);
  border-radius:999px;
  padding:8px 16px;
  font-size:13px;
  font-weight:600;
  box-shadow:var(--shadow-card);
  display:flex;
  align-items:center;
  gap:6px;
}
.complete-word-chip .kr{font-family:var(--font-display); font-weight:700;}
.complete .btn{min-width:240px;}
.complete-unlock-banner{
  background:linear-gradient(135deg, var(--gold), var(--peach));
  color:var(--white);
  padding:16px 22px;
  border-radius:var(--r-md);
  font-weight:700;
  margin-bottom:24px;
  box-shadow:var(--shadow-card);
}

.profile{padding:8px 20px 100px; position:relative; z-index:1;}
.profile-header{text-align:center; padding:24px 0 8px;}
.profile-avatar{
  width:84px; height:84px;
  border-radius:50%;
  background:linear-gradient(135deg, var(--sakura), var(--peach));
  display:flex; align-items:center; justify-content:center;
  font-size:36px;
  margin:0 auto 14px;
  box-shadow:var(--shadow-card);
}
.profile-name{font-family:var(--font-display); font-size:24px; font-weight:700;}
.profile-since{font-size:13px; color:var(--ink-soft); margin-top:4px; font-weight:500;}
.profile-stats{display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; margin:24px 0;}
.profile-stat{background:var(--white); border-radius:var(--r-md); padding:16px 8px; text-align:center; box-shadow:var(--shadow-card);}
.profile-stat-value{font-size:20px; font-weight:800;}
.profile-stat-label{font-size:10.5px; color:var(--ink-soft); font-weight:600; margin-top:3px; line-height:1.3;}

.collection-list{display:flex; flex-direction:column; gap:10px;}
.collection-row{background:var(--white); border-radius:var(--r-md); padding:16px; display:flex; align-items:center; gap:14px; box-shadow:var(--shadow-card);}
.collection-row.locked{opacity:0.5;}
.collection-emoji{font-size:26px;}
.collection-info{flex:1;}
.collection-name{font-weight:700; font-size:14px;}
.collection-progress-text{font-size:12px; color:var(--ink-soft); margin-top:2px; font-weight:500;}
.collection-bar{width:60px; height:6px; background:var(--cream-deep); border-radius:999px; overflow:hidden;}
.collection-bar-fill{height:100%; background:var(--sage-deep); border-radius:999px;}

.settings{padding:8px 20px 100px; position:relative; z-index:1;}
.settings-group{background:var(--white); border-radius:var(--r-md); box-shadow:var(--shadow-card); margin-bottom:18px; overflow:hidden;}
.settings-row{display:flex; align-items:center; justify-content:space-between; padding:18px 18px; border-bottom:1px solid var(--cream-deep);}
.settings-row:last-child{border-bottom:none;}
.settings-row-label{font-size:15px; font-weight:600;}
.settings-row-desc{font-size:12px; color:var(--ink-soft); margin-top:2px; font-weight:500;}

.toggle{
  width:50px; height:30px;
  border-radius:999px;
  background:var(--cream-deep);
  position:relative;
  transition:background 0.2s ease;
  flex-shrink:0;
}
.toggle.on{background:var(--sage-deep);}
.toggle-knob{
  width:24px; height:24px;
  border-radius:50%;
  background:var(--white);
  position:absolute;
  top:3px; left:3px;
  box-shadow:0 1px 4px rgba(0,0,0,0.15);
  transition:transform 0.2s cubic-bezier(0.34,1.56,0.64,1);
}
.toggle.on .toggle-knob{transform:translateX(20px);}
.danger-text{color:var(--peach); font-weight:700;}

.modal-overlay{
  position:fixed;
  inset:0;
  background:rgba(58,51,46,0.4);
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:100;
  padding:24px;
  opacity:0;
  pointer-events:none;
  transition:opacity 0.25s ease;
}
.modal-overlay.show{opacity:1; pointer-events:auto;}
.modal-box{
  background:var(--white);
  border-radius:var(--r-lg);
  padding:28px 24px;
  max-width:340px;
  width:100%;
  text-align:center;
  transform:scale(0.9);
  transition:transform 0.25s cubic-bezier(0.34,1.56,0.64,1);
}
.modal-overlay.show .modal-box{transform:scale(1);}
.modal-title{font-family:var(--font-display); font-size:19px; font-weight:700; margin-bottom:8px;}
.modal-desc{font-size:14px; color:var(--ink-soft); margin-bottom:22px; line-height:1.5;}
.modal-actions{display:flex; gap:10px;}
.modal-actions .btn{flex:1; font-size:15px; padding:14px;}

.toast{
  position:fixed;
  bottom:100px;
  left:50%;
  transform:translateX(-50%) translateY(20px);
  background:var(--ink);
  color:var(--white);
  padding:12px 22px;
  border-radius:999px;
  font-size:13px;
  font-weight:600;
  z-index:60;
  opacity:0;
  transition:opacity 0.3s ease, transform 0.3s ease;
  pointer-events:none;
  max-width:90%;
  text-align:center;
}
.toast.show{opacity:1; transform:translateX(-50%) translateY(0);}

/* Toast de incentivo — aparece no topo, leve, não cobre os cards */
.enc-toast{
  position:fixed;
  top:72px;
  left:50%;
  transform:translateX(-50%) translateY(-12px);
  background:var(--white);
  color:var(--ink-soft);
  border:1.5px solid var(--sakura);
  padding:10px 20px;
  border-radius:999px;
  font-size:13px;
  font-weight:600;
  z-index:60;
  opacity:0;
  transition:opacity 0.28s ease, transform 0.28s ease;
  pointer-events:none;
  max-width:88%;
  text-align:center;
  box-shadow:0 3px 12px rgba(244,184,196,0.25);
}
.enc-toast.show{opacity:1; transform:translateX(-50%) translateY(0);}

.empty-state{text-align:center; padding:60px 30px; color:var(--ink-soft);}
.empty-state-emoji{font-size:44px; margin-bottom:14px;}
.empty-state-text{font-size:14px; font-weight:500;}
::-webkit-scrollbar{width:0; height:0;}

/* QUICK GAME STYLES */
.quick-screen{padding:20px 20px 100px;position:relative;z-index:1;}
.quick-hero{text-align:center;margin:10px 0 18px;}
.quick-title{font-family:var(--font-display);font-size:34px;}
.quick-sub{color:var(--ink-soft);margin-top:6px;}
.quick-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:18px 0;}
.quick-stat,.quick-start-card,.quick-question,.quick-gameover{background:var(--white);border-radius:var(--r-lg);box-shadow:var(--shadow-card);}
.quick-stat{text-align:center;padding:16px;}
.quick-stat-value{font-size:26px;font-weight:800}
.quick-stat-label{font-size:12px;color:var(--ink-soft)}
.quick-timer{height:14px;background:var(--cream-deep);border-radius:999px;overflow:hidden;margin:10px 0 18px}
.quick-timer-fill{height:100%;background:linear-gradient(90deg,var(--sakura),var(--peach));transition:width .08s linear}
.quick-question{text-align:center;padding:26px 20px;margin-bottom:18px}
.quick-question-label{font-size:13px;color:var(--ink-soft);font-weight:700}
.quick-korean{
  font-family:var(--font-display);
  font-weight:700;
  font-size:54px;
  margin-top:8px;
  line-height:1.15;
  word-break:keep-all;
  overflow-wrap:normal;
  line-break:strict;
  hyphens:none;
  text-wrap:balance;
  padding:0 8px;
}
/* Mesma tipografia adaptativa do Match: o tamanho da fonte se ajusta ao comprimento
   do texto pra nunca quebrar sílabas Hangul no meio (ex: "요" isolado numa linha). */
.quick-korean.kr-short{font-size:54px;}
.quick-korean.kr-medium{font-size:44px;}
.quick-korean.kr-long{font-size:36px;}
.quick-korean.kr-phrase{font-size:28px; line-height:1.25;}
.quick-options{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.quick-option{background:var(--white);border-radius:24px;padding:18px 12px;font-weight:700;box-shadow:var(--shadow-card);font-size:16px;min-height:72px}
.quick-option.correct{background:#dff3df}
.quick-option.wrong{background:#ffe2e2}
.quick-start-card,.quick-gameover{text-align:center;padding:28px 22px}
.quick-start-emoji,.quick-gameover-emoji{font-size:56px;margin-bottom:12px}
.quick-start-title,.quick-gameover-title{font-family:var(--font-display);font-size:24px;margin-bottom:8px}
.quick-gameover-score{font-size:64px;font-weight:800;margin:10px 0}


/* ============================================
   MATCH INFINITO
   ============================================ */
.infinite-screen{
  padding:8px 18px 100px;
  position:relative;
  z-index:1;
}
.infinite-hero{
  margin:14px 0 14px;
  text-align:center;
}
.infinite-title{
  font-family:var(--font-display);
  font-size:30px;
  font-weight:700;
  line-height:1.15;
}
.infinite-sub{
  color:var(--ink-soft);
  font-size:14px;
  font-weight:600;
  margin-top:6px;
}
.level-grid{
  display:flex;
  flex-direction:column;
  gap:12px;
  margin-top:20px;
}
.level-card{
  background:var(--white);
  border-radius:var(--r-lg);
  box-shadow:var(--shadow-card);
  padding:20px;
  text-align:left;
  display:flex;
  gap:14px;
  align-items:center;
  border:2px solid transparent;
}
.level-card-active{
  border-color:var(--sage);
  background:linear-gradient(135deg, #F4FAF2, var(--white));
}

/* Indicador discreto de nível ativo, na tela Treinar */
.level-indicator{
  width:100%;
  display:flex;
  align-items:center;
  gap:10px;
  background:transparent;
  border:1.5px dashed var(--cream-deep);
  border-radius:999px;
  padding:10px 16px;
  margin:2px 0 4px;
  cursor:pointer;
  font-family:inherit;
}
.level-indicator-emoji{font-size:16px;}
.level-indicator-text{
  flex:1;
  text-align:left;
  font-size:12.5px;
  font-weight:700;
  color:var(--ink-soft);
}
.level-indicator-edit{
  font-size:11px;
  font-weight:700;
  color:var(--sakura-deep);
  text-decoration:underline;
}

.level-picker-options{
  display:flex;
  flex-direction:column;
  gap:10px;
  margin:18px 0;
}
.level-picker-opt{
  display:flex;
  align-items:center;
  gap:10px;
  background:var(--cream);
  border:2px solid transparent;
  border-radius:var(--r-md);
  padding:14px 16px;
  font-family:inherit;
  font-size:14px;
  font-weight:700;
  color:var(--ink);
  text-align:left;
}
.level-picker-opt span{font-size:18px;}
.level-picker-opt.active{
  border-color:var(--sage);
  background:#F4FAF2;
}
.level-emoji{font-size:34px; width:44px; text-align:center;}
.level-name{font-family:var(--font-display); font-size:22px; font-weight:700;}
.level-card-active .level-name{font-size:18px;}
.level-desc{font-size:13px; color:var(--ink-soft); font-weight:600; margin-top:3px; line-height:1.35;}
.infinite-top{
  display:flex;
  align-items:center;
  gap:10px;
  padding:14px 0 12px;
}
.infinite-close{
  width:38px;
  height:38px;
  border-radius:50%;
  background:var(--white);
  box-shadow:var(--shadow-card);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:16px;
  color:var(--ink-soft);
  flex-shrink:0;
}
.infinite-scorebar{
  flex:1;
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:8px;
}
.infinite-pill{
  background:var(--white);
  border-radius:999px;
  box-shadow:var(--shadow-card);
  padding:8px 6px;
  text-align:center;
}
.infinite-pill-value{
  font-size:17px;
  font-weight:900;
  color:var(--ink);
}
.infinite-pill-label{
  font-size:9px;
  color:var(--ink-faint);
  font-weight:800;
  text-transform:uppercase;
  letter-spacing:.04em;
}
.infinite-board{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px;
  align-items:start;
}
.infinite-col{
  display:flex;
  flex-direction:column;
  gap:12px;
}
.infinite-card{
  min-height:82px;
  border-radius:26px;
  padding:14px 10px;
  background:var(--white);
  box-shadow:var(--shadow-card);
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  border:2px solid transparent;
  font-weight:800;
  line-height:1.15;
  transition:transform .16s ease, border-color .16s ease, box-shadow .16s ease, background .16s ease, opacity .2s ease;
}
.infinite-card.kr{
  font-family:var(--font-display);
  font-weight:700;
  font-size:28px;
  flex-direction:column;
  gap:6px;
  line-height:1.15;
  word-break:keep-all;
  overflow-wrap:normal;
  line-break:strict;
  hyphens:none;
  text-wrap:balance;
  padding-left:6px;
  padding-right:6px;
}
/* Mesma tipografia adaptativa do Match normal, evitando quebra feia de sílabas Hangul. */
.infinite-card.kr.kr-short{font-size:30px;}
.infinite-card.kr.kr-medium{font-size:26px;}
.infinite-card.kr.kr-long{font-size:21px;}
.infinite-card.kr.kr-phrase{font-size:16px; line-height:1.2;}
.infinite-card.pt{
  font-size:15.5px;
}
.infinite-card.kr:nth-child(1){background:#FFF0F4;}
.infinite-card.kr:nth-child(2){background:#FFF7D8;}
.infinite-card.kr:nth-child(3){background:#EEF7EA;}
.infinite-card.kr:nth-child(4){background:#EAF5FF;}
.infinite-card.kr:nth-child(5){background:#F3ECFF;}
.infinite-card.selected{
  border-color:var(--sakura-deep);
  box-shadow:var(--shadow-float);
  transform:scale(1.03);
}
.infinite-card.correct{
  background:var(--sage);
  color:white;
  border-color:var(--sage-deep);
}
.infinite-card.wrong{
  animation:shakeCard .4s ease;
  background:#FFE5EA;
  border-color:var(--sakura-deep);
}
.infinite-small-audio{
  font-family:var(--font-body);
  font-size:11px;
  color:var(--sakura-deep);
  font-weight:900;
}
.infinite-actions{
  margin-top:16px;
  display:flex;
  gap:10px;
}
.infinite-actions .btn{
  font-size:14px;
  padding:14px 18px;
}
.quick-question-label{
  display:none !important;
}
.quick-korean{
  margin-top:0 !important;
}
.quick-option{
  min-height:78px;
  border:2px solid transparent;
}
.quick-option:nth-child(1){background:#FFF0F4;}
.quick-option:nth-child(2){background:#FFF7D8;}
.quick-option:nth-child(3){background:#EEF7EA;}
.quick-option:nth-child(4){background:#EAF5FF;}
.quick-option:nth-child(5){background:#F3ECFF;}
.quick-option:nth-child(6){background:#FFF3EA;}


/* ============================================
   TREINAR + NAVEGAÇÃO ENXUTA + FADE SUAVE
   ============================================ */
.bottom-nav{
  justify-content:space-evenly;
}
.nav-item{
  padding:6px 22px;
}
.train-screen{
  padding:8px 20px 100px;
  position:relative;
  z-index:1;
}
.train-card{
  width:100%;
  background:var(--white);
  border-radius:var(--r-lg);
  box-shadow:var(--shadow-card);
  padding:20px;
  display:flex;
  align-items:center;
  gap:16px;
  text-align:left;
  margin-bottom:14px;
  transition:transform .15s ease, box-shadow .15s ease;
}
.train-card:active{
  transform:scale(.97);
  box-shadow:var(--shadow-press);
}
.train-card-icon{
  width:54px;
  height:54px;
  border-radius:18px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:28px;
  flex-shrink:0;
}
.train-card:nth-of-type(1) .train-card-icon{background:#FFF0F4;}
.train-card:nth-of-type(2) .train-card-icon{background:#FFF7D8;}
.train-card:nth-of-type(3) .train-card-icon{background:#EEF7EA;}
.train-card-title{
  font-family:var(--font-display);
  font-size:22px;
  font-weight:700;
  color:var(--ink);
  line-height:1.15;
}
.train-card-desc{
  font-size:13px;
  color:var(--ink-soft);
  font-weight:600;
  line-height:1.35;
  margin-top:4px;
}
.train-card-arrow{
  margin-left:auto;
  font-size:26px;
  color:var(--ink-faint);
}
.infinite-card{
  will-change:opacity, transform;
}
.infinite-card.fade-out{
  opacity:0;
  transform:scale(.92);
  transition:opacity 0.12s ease, transform 0.12s ease;
}
.infinite-card.fade-in{
  animation:softCardIn .16s ease both;
}
@keyframes softCardIn{
  from{opacity:0; transform:translateY(4px) scale(.97);}
  to{opacity:1; transform:translateY(0) scale(1);}
}
.infinite-card.correct{
  animation:softCorrect .22s ease both;
}
@keyframes softCorrect{
  from{transform:scale(1);}
  to{transform:scale(.98);}
}


/* ============================================
   VIDAS + GAME OVER MATCH INFINITO
   ============================================ */
.infinite-lives{font-size:16px;letter-spacing:1px;white-space:nowrap;}
.infinite-life-lost{animation:lifeShake .35s ease;}
@keyframes lifeShake{0%,100%{transform:translateX(0);}25%{transform:translateX(-4px);}75%{transform:translateX(4px);}}
.infinite-error-toast{
  position:fixed;left:50%;top:18%;transform:translateX(-50%) translateY(-8px);
  background:#fff;color:var(--ink);box-shadow:var(--shadow-float);border-radius:999px;
  padding:12px 18px;font-weight:900;z-index:80;opacity:0;pointer-events:none;
  transition:opacity .2s ease, transform .2s ease;
}
.infinite-error-toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.infinite-gameover{
  background:var(--white);border-radius:var(--r-lg);box-shadow:var(--shadow-float);
  padding:30px 22px;text-align:center;margin-top:18px;
}
.infinite-gameover-emoji{font-size:58px;margin-bottom:10px;}
.infinite-gameover-title{font-family:var(--font-display);font-size:30px;font-weight:700;}
.infinite-gameover-text{color:var(--ink-soft);font-weight:700;line-height:1.55;margin:12px 0 24px;}
.infinite-gameover-score{font-size:58px;font-weight:900;color:var(--sakura-deep);line-height:1;margin:12px 0;}


/* ============================================
   MODO DORAMEIRO
   ============================================ */
.dorama-badge{
  display:inline-flex;
  align-items:center;
  gap:6px;
  background:#FFF0F4;
  color:var(--sakura-deep);
  padding:7px 12px;
  border-radius:999px;
  font-size:12px;
  font-weight:900;
  margin-top:8px;
}
.dorama-list{
  display:flex;
  flex-direction:column;
  gap:10px;
  margin:12px 0 18px;
}
.dorama-pick{
  background:var(--white);
  border-radius:22px;
  box-shadow:var(--shadow-card);
  padding:14px 16px;
  display:flex;
  align-items:center;
  gap:12px;
  font-weight:800;
  text-align:left;
}
.dorama-pick span:first-child{font-size:24px;}
.dorama-pick small{
  display:block;
  color:var(--ink-soft);
  font-size:11px;
  font-weight:700;
  margin-top:2px;
}
.setting-check{
  width:26px;
  height:26px;
  border-radius:9px;
  background:#FFF0F4;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:15px;
  flex-shrink:0;
}


/* Toggle do Modo Dorameiro na tela Treinar */
.dorama-mode-card{
  width:100%;
  background:linear-gradient(135deg,#FFF0F4,var(--white));
  border-radius:var(--r-lg);
  box-shadow:var(--shadow-card);
  padding:18px 18px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:14px;
  margin:16px 0 18px;
  text-align:left;
}
.dorama-mode-title{
  font-family:var(--font-display);
  font-size:22px;
  font-weight:700;
  color:var(--ink);
  line-height:1.1;
}
.dorama-mode-desc{
  font-size:13px;
  color:var(--ink-soft);
  font-weight:600;
  line-height:1.35;
  margin-top:4px;
}
.dorama-mode-card .toggle{
  transform:scale(1.08);
}

/* ============================================
   OI COREIA PLUS — selo, banner e tela de upgrade
   ============================================ */
.plus-badge{
  display:inline-flex;
  align-items:center;
  gap:4px;
  font-size:11px;
  font-weight:800;
  color:#7A5A12;
  background:linear-gradient(135deg,#FCE7B8,var(--gold));
  border-radius:999px;
  padding:4px 10px;
  white-space:nowrap;
}

/* Selo dourado metálico — identifica quem já é Plus, ao lado do nome na Home.
   Contraste forte de propósito (fundo escuro + brilho), pra não se perder no creme do app. */
.plus-seal{
  display:inline-flex;
  align-items:center;

}

}

  from{opacity:0; transform:translateY(4px) scale(.97);}

}

// Frases que mudam conforme a cerejeira vai florindo
const SAKURA_PHRASES = [
  { min:0,   text:'Sua cerejeira ainda está dormindo... 🌑' },

// Seed simples para posições reproduzíveis por usuário (cada cerejeira é única)
function seededRand(seed, index){
  const x = Math.sin(seed * 9301 + index * 49297 + 233720) * 46656;
  return x - Math.floor(x);
}

function renderSakuraTree(wrap, phraseEl, flowers, name){
  if(!wrap) return;

  // Parâmetros principais
  const W = 280, H = 230;
  const MAX_FLOWERS = 500; // flowers necessárias pra árvore completamente cheia
  const ratio = Math.min(1, flowers / MAX_FLOWERS);

  // Seed baseada no nome do usuário — cada pessoa tem sua própria árvore
  let seed = 1;
  for(let i = 0; i < name.length; i++) seed = seed * 31 + name.charCodeAt(i);

  // Estrutura de galhos: cada galho tem ponto inicial, comprimento e ângulo
  const trunk = { x1: W/2, y1: H, x2: W/2, y2: H * 0.55 };

  // Galhos principais (sempre visíveis)
  const branches = [
    // tronco principal
    { x1: W/2, y1: H,       x2: W/2,     y2: H*0.55, w:7 },
    // galhos primários
    { x1: W/2, y1: H*0.6,   x2: W*0.28,  y2: H*0.38, w:4 },
    { x1: W/2, y1: H*0.6,   x2: W*0.72,  y2: H*0.38, w:4 },
    { x1: W/2, y1: H*0.55,  x2: W*0.38,  y2: H*0.25, w:3 },
    { x1: W/2, y1: H*0.55,  x2: W*0.62,  y2: H*0.25, w:3 },
    { x1: W/2, y1: H*0.58,  x2: W*0.50,  y2: H*0.15, w:3 },
    // galhos secundários
    { x1: W*0.28, y1:H*0.38, x2: W*0.15, y2: H*0.22, w:2 },
    { x1: W*0.28, y1:H*0.38, x2: W*0.35, y2: H*0.20, w:2 },
    { x1: W*0.72, y1:H*0.38, x2: W*0.85, y2: H*0.22, w:2 },
    { x1: W*0.72, y1:H*0.38, x2: W*0.65, y2: H*0.20, w:2 },
    { x1: W*0.38, y1:H*0.25, x2: W*0.28, y2: H*0.10, w:1.5 },
    { x1: W*0.38, y1:H*0.25, x2: W*0.45, y2: H*0.08, w:1.5 },
    { x1: W*0.62, y1:H*0.25, x2: W*0.72, y2: H*0.10, w:1.5 },
    { x1: W*0.62, y1:H*0.25, x2: W*0.55, y2: H*0.08, w:1.5 },
    { x1: W*0.50, y1:H*0.15, x2: W*0.42, y2: H*0.03, w:1.5 },
    { x1: W*0.50, y1:H*0.15, x2: W*0.58, y2: H*0.03, w:1.5 },
  ];

  // Pontos de flor distribuídos nos galhos — cada galho tem flores nas pontas e ao longo
  const flowerPoints = [];
  branches.forEach((b, bi) => {
    const count = bi < 2 ? 3 : bi < 6 ? 6 : 10; // mais flores nas pontas
    for(let fi = 0; fi < count; fi++){
      const t = 0.55 + (fi / count) * 0.5; // apenas na metade superior dos galhos
      const jx = (seededRand(seed, bi*100+fi*3)   - 0.5) * 22;
      const jy = (seededRand(seed, bi*100+fi*3+1) - 0.5) * 22;
      flowerPoints.push({
        x: b.x1 + (b.x2-b.x1)*t + jx,
        y: b.y1 + (b.y2-b.y1)*t + jy,
        r: 4.5 + seededRand(seed, bi*100+fi*3+2) * 3.5,
        // threshold: entre 0 e 1, quando essa flor aparece
        threshold: seededRand(seed, bi*100+fi*7+42) * 0.92,
      });
    }
  });

  // Cor dos galhos — vai de marrom seco (sem flores) a marrom caloroso (florido)
  const branchColor = `hsl(${25 + ratio*8}, ${35 + ratio*15}%, ${30 + ratio*8}%)`;

  // Monta o SVG — viewBox com margem extra em volta pra nada cortar
  // (flores no topo dos galhos mais altos podem ultrapassar y=0 levemente).
  const MARGIN = 26;
  let svg = `<svg viewBox="-${MARGIN} -${MARGIN} ${W + MARGIN*2} ${H + MARGIN*2}" xmlns="http://www.w3.org/2000/svg">`;

  // Galhos
  branches.forEach(b => {
    svg += `<line x1="${b.x1.toFixed(1)}" y1="${b.y1.toFixed(1)}" x2="${b.x2.toFixed(1)}" y2="${b.y2.toFixed(1)}"
      stroke="${branchColor}" stroke-width="${b.w}" stroke-linecap="round"/>`;
  });

  // Flores — só aparecem se ratio atingiu o threshold daquela flor
  flowerPoints.forEach((fp, i) => {
    if(ratio < fp.threshold) return;
    const appear = Math.min(1, (ratio - fp.threshold) / 0.08); // fade gradual de 0 a 1
    const opacity = appear.toFixed(2);
    const scale = (0.6 + appear * 0.4).toFixed(2);

    // Pétalas: 5 elipses rotacionadas em torno do centro
    const cx = fp.x.toFixed(1), cy = fp.y.toFixed(1), r = fp.r;
    const pr = (r * 0.72).toFixed(1); // raio de órbita das pétalas
    const pw = (r * 0.55).toFixed(1); // largura pétala
    const ph = (r * 0.80).toFixed(1); // altura pétala
    const hue = 340 + seededRand(seed, i*17) * 20; // rosa ligeiramente variado
    const petalColor = `hsl(${hue.toFixed(0)}, 65%, 80%)`;
    const centerColor = `hsl(${(hue+10).toFixed(0)}, 50%, 95%)`;
    const pulseDelay = (seededRand(seed, i*31+5) * 3.2).toFixed(2);

    // <g> externo cuida de posição+fade (translate/opacity, calculados em JS);
    // <g> interno cuida da pulsação animada via CSS (scale) — não conflitam entre si.
    svg += `<g opacity="${opacity}" transform="translate(${cx},${cy}) scale(${scale})">`;
    svg += `<g class="sakura-bloom" style="--d:${pulseDelay}s">`;
    for(let p = 0; p < 5; p++){
      const angle = (p / 5) * 360;
      svg += `<ellipse cx="0" cy="-${pr}" rx="${pw}" ry="${ph}"
        fill="${petalColor}" opacity="0.9"
        transform="rotate(${angle})"/>`;
    }
    // Miolo
    svg += `<circle cx="0" cy="0" r="${(r*0.28).toFixed(1)}" fill="${centerColor}"/>`;
    svg += `</g>`; // fecha .sakura-bloom (pulsação)
    svg += `</g>`; // fecha posicionamento/fade
  });

  // Pétalas caindo (quando ratio > 0.4) — agora com queda contínua e sutil via CSS,
  // em vez de pétalas estáticas. Cada uma cai num ritmo e atraso levemente diferente.
  if(ratio > 0.4){
    const fallingCount = Math.floor(ratio * 8);
    for(let f = 0; f < fallingCount; f++){
      const fx = (seededRand(seed, f*23+7) * W * 0.8 + W*0.1).toFixed(1);
      const fy = (seededRand(seed, f*23+8) * H * 0.5 + H*0.05).toFixed(1);
      const fr = (3 + seededRand(seed, f*23+9) * 3).toFixed(1);
      const fop = (0.3 + seededRand(seed, f*23+10) * 0.4).toFixed(2);
      const fdur = (6 + seededRand(seed, f*23+12) * 5).toFixed(1);
      const fdelay = (seededRand(seed, f*23+13) * 8).toFixed(1);
      const fdriftX = (seededRand(seed, f*23+14) * 30 - 15).toFixed(0);
      const fdriftY = (50 + seededRand(seed, f*23+15) * 50).toFixed(0);
      svg += `<ellipse class="sakura-falling" cx="${fx}" cy="${fy}" rx="${fr}" ry="${(fr*0.6).toFixed(1)}"
        fill="hsl(345,65%,82%)"
        style="--fdur:${fdur}s; --fdelay:${fdelay}s; --fop:${fop}; --fx:${fdriftX}px; --fy:${fdriftY}px;"
        transform="rotate(${(seededRand(seed,f*23+11)*60-30).toFixed(0)},${fx},${fy})"/>`;
    }
  }

  svg += `</svg>`;
  wrap.innerHTML = svg;

  // Frase
  if(phraseEl){
    const phrase = [...SAKURA_PHRASES].reverse().find(p => flowers >= p.min);
    phraseEl.textContent = phrase ? phrase.text : SAKURA_PHRASES[0].text;
  }
}

function loadState(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) return defaultState();
    const parsed = JSON.parse(raw);
    return Object.assign(defaultState(), parsed);
  }catch(e){
    console.warn('Não foi possível ler o progresso salvo, iniciando do zero.', e);
    return defaultState();
  }
}

  try{
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));

    console.warn('Não foi possível salvar o progresso.', e);

}

// ============================================
// OI COREIA PLUS — gating de conteúdo pago
// Pagamento único vitalício, sem assinatura. state.isPlus é a fonte de verdade local.
// IMPORTANTE: hoje isPlus é ativado por um botão de simulação (ver renderPlusScreen).
// Numa versão publicada de verdade, troque activatePlusMock() pela confirmação real
// de compra (Google Play Billing / App Store / Stripe) antes de setar state.isPlus=true.
// ============================================
function isPlusLocked(item){
  return !!(item && item.plus && !state.isPlus);
}
function isThemeAccessible(theme){
  // Acessível só se desbloqueado por flores E (não é conteúdo Plus OU já é assinante Plus).
  return isThemeUnlocked(theme) && !isPlusLocked(theme);
}

let koreanVoice = null;
function pickKoreanVoice(){
  if(!('speechSynthesis' in window)) return;
  const voices = window.speechSynthesis.getVoices();
  koreanVoice = voices.find(v => v.lang === 'ko-KR') || voices.find(v => v.lang && v.lang.startsWith('ko')) || null;
}
if('speechSynthesis' in window){
  pickKoreanVoice();
  window.speechSynthesis.onvoiceschanged = pickKoreanVoice;
}

function speakKorean(text){
  if(!state.soundOn) return;
  if(!('speechSynthesis' in window)){
    showToast('Seu navegador não suporta áudio de voz.');
    return;
  }
  try{
    window.speechSynthesis.cancel();
    const utter = new SpeechSynthesisUtterance(text);
    utter.lang = 'ko-KR';
    if(koreanVoice) utter.voice = koreanVoice;
    utter.rate = 0.85;
    window.speechSynthesis.speak(utter);
  }catch(e){
    console.warn('Erro ao reproduzir áudio', e);
  }
}

let toastTimer = null;
function showToast(msg){
  let toast = document.getElementById('toastEl');
  if(!toast){
    toast = document.createElement('div');
    toast.id = 'toastEl';
    toast.className = 'toast';
    document.body.appendChild(toast);

  clearTimeout(toastTimer);

}

const app = document.getElementById('app');
let currentMatchSession = null;

function render(){
  saveState();
  const finalRoute = state.onboarded ? (window.__route || 'home') : (window.__route || 'splash');
  app.innerHTML = '';
  switch(finalRoute){
    case 'splash': renderSplash(); break;
    case 'onboard': renderOnboard(); break;
    case 'home': renderHome(); break;
    case 'train': renderTrainScreen(); break;
    case 'plus': renderPlusScreen(); break;
    case 'themes': renderThemesScreen(); break;
    case 'quickgame': renderQuickGame(); break;
    case 'infinite': renderInfiniteMatch(); break;
    case 'session': renderSessionMode(); break;
    case 'match': renderMatchScreen(); break;
    case 'complete': renderCompleteScreen(); break;
    case 'profile': renderProfile(); break;
    case 'settings': renderSettings(); break;
    default: renderHome();
  }
}

function goTo(route, params){
  if(route !== 'quickgame') stopQuickTimer();
  window.__route = route;
  window.__routeParams = params || {};
  render();
  window.scrollTo(0,0);
}

// ============================================================
// GOOGLE PLAY BILLING — integração real
// ============================================================
// Como funciona: quando o app roda empacotado como TWA (Trusted Web Activity)
// dentro do Android, o sistema injeta uma ponte JavaScript chamada
// `window.PaymentRequest` com o Google Play Billing como método de pagamento
// (via Digital Goods API: https://github.com/WICG/digital-goods).
// Fora do TWA (testando num navegador comum), essa API não existe — então
// caímos automaticamente no modo demonstração, sem quebrar o app.
//
// ID do produto: precisa ser cadastrado primeiro no Google Play Console em
// Monetização > Produtos > Produtos integrados ao app, como produto
// NÃO-CONSUMÍVEL (compra única, fica vinculada à conta Google para sempre).
const PLUS_PRODUCT_ID = 'oi_coreia_plus_vitalicio';

// Verifica se a Digital Goods API (Play Billing real) está disponível neste ambiente.
function hasRealBilling(){
  return typeof window.getDigitalGoodsService === 'function';
}

async function purchasePlus(backRoute){
  if(!hasRealBilling()){
    // Fora do app instalado via TWA: não há como cobrar de verdade.
    // Mantemos o modo demonstração pra continuar testável no navegador.
    activatePlusMock(backRoute);
    return;
  }

  const btn = document.getElementById('btnUnlockPlus');
  if(btn){ btn.disabled = true; btn.textContent = 'Processando...'; }

  try {
    // 1. Conecta ao serviço de Digital Goods do Google Play
    const service = await window.getDigitalGoodsService('https://play.google.com/billing');

    // 2. Inicia o fluxo de pagamento nativo do Android (mostra a tela do Google Play)
    const request = new PaymentRequest(
      [{ supportedMethods:'https://play.google.com/billing',
         data:{ sku: PLUS_PRODUCT_ID } }],
      { total:{ label:'Oi Coreia Plus', amount:{ currency:'BRL', value:'9.99' } } }
    );
    const paymentResponse = await request.show();
    const purchaseToken = paymentResponse.details.purchaseToken;
    await paymentResponse.complete('success');

    // 3. CRÍTICO: o token precisa ser validado num servidor seu antes de liberar
    // o Plus — confiar só no que voltou pro navegador é inseguro (qualquer pessoa
    // com conhecimento técnico poderia forjar essa resposta no DevTools).
    // Ver verifyPurchaseOnServer() logo abaixo para a explicação completa.
    const verified = await verifyPurchaseOnServer(purchaseToken);

    if(verified){
      state.isPlus = true;
      state.plusPurchaseToken = purchaseToken; // guardado para possível restauração futura
      saveState();
      showToast('✨ Plus desbloqueado! Obrigada por apoiar o Oi Coreia 🌸');
      render();
    } else {
      showToast('Não conseguimos confirmar sua compra. Tente novamente ou fale com o suporte.');
    }
  } catch(err){
    // Cancelamento do usuário (fechou a tela de pagamento) cai aqui também —
    // não é um erro real, só não mostramos nada de assustador.
    if(err && err.name !== 'AbortError'){
      showToast('Algo deu errado ao processar o pagamento. Tente novamente.');
    }
  } finally {
    if(btn){ btn.disabled = false; btn.textContent = 'Desbloquear Plus'; }
  }
}

// Valida o token de compra contra um endpoint seu (não embutido aqui de propósito).
// PRECISA rodar num servidor — nunca confie em validação feita só no navegador.
//
// Arquitetura recomendada (gratuita, sem manter servidor ligado o tempo todo):
//   1. Crie uma Cloud Function (Google Cloud) ou Edge Function (Vercel/Netlify).
//   2. Ela recebe { purchaseToken, productId } do app.
//   3. Ela chama a Google Play Developer API (purchases.products.get) usando
//      uma Service Account com permissão de "Ver dados financeiros" no Play Console.
//   4. Se a API confirmar que a compra é válida e não foi reembolsada, retorna
//      { valid: true } — só então o app libera o Plus.
//   5. Opcional: salve o purchaseToken + um ID anônimo do dispositivo num banco
//      (ex: Firestore) para permitir "restaurar compra" em outro aparelho depois.
//
// Troque a URL abaixo pelo endereço real da sua function quando estiver pronta.
async function verifyPurchaseOnServer(purchaseToken){
  const ENDPOINT = 'https://SUBSTITUA-PELA-SUA-CLOUD-FUNCTION/verify-purchase';
  try {
    const res = await fetch(ENDPOINT, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ purchaseToken, productId: PLUS_PRODUCT_ID }),
    });
    if(!res.ok) return false;
    const data = await res.json();
    return data.valid === true;
  } catch(err){
    return false;
  }
}

// Ativa o Plus localmente, sem nenhuma transação financeira real.
// Usado como fallback quando o app não está rodando dentro do TWA com
// Billing disponível (ex: testando no navegador do computador).
function activatePlusMock(backRoute){

function shuffleArray(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

const ROUND_SIZE = 20;

function startMatchSession(themeId){
  const theme = findThemeById(themeId);
  if(!theme) return;

  // Camada central de proteção: mesmo que algum botão futuro chame startMatchSession
  // direto, conteúdo Plus nunca inicia sessão sem state.isPlus.
  if(isPlusLocked(theme)){
    goTo('plus', {from: window.__route || 'train'});
    return;
  }

  const pool = shuffleArray(theme.words);
  const roundWords = pool.slice(0, Math.min(ROUND_SIZE, theme.words.length));

  // ptMap guarda kr->pt de TODA a rodada, fixo do início ao fim — diferente de
  // session.pairs, que só reflete o que está visível no board agora (pares já
  // resolvidos saem dali pra sumir da tela). A tela final usa o ptMap pra montar
  // os chips de revisão corretamente, mesmo para palavras já removidas do board.
  const ptMap = {};
  roundWords.forEach(([kr, pt]) => { ptMap[kr] = pt; });

  currentMatchSession = {
    themeId,
    themeName: theme.name,
    themeEmoji: theme.emoji,
    totalGoal: roundWords.length,
    queue: roundWords.slice(5),
    pairs: roundWords.slice(0, 5),
    matchedKr: [],
    selectedKr: null,
    selectedPt: null,
    flowersEarned: 0,
    wordsLearnedThisRound: [],
    ptMap,
  };

  goTo('match');
}

// "Treinar agora" — entrada instantânea sem escolher tema, pro uso de "sentei
// no sofá, quero só testar o que já sei por 15 minutinhos". Mistura palavras
// de todos os temas que a pessoa já tem acesso (respeitando flores e Plus),
// e usa o vocabulário aprendido com mais frequência só se já existir progresso —
// senão mistura tudo igual, sem fazer suposição nenhuma sobre nível.
function startQuickTrain(){
  // Mesma regra do Jogo Rápido e Match Infinito: conteúdo marcado como
  // excludeFromGeneric (Fé, Bíblia) não entra na mistura — só aparece se a
  // pessoa escolher esse tema diretamente.
  const accessibleThemes = THEMES.filter(t => isThemeAccessible(t) && !t.excludeFromGeneric);
  let pool = [];
  accessibleThemes.forEach(theme=>{
    theme.words.forEach(([kr, pt])=> pool.push([kr, pt, theme.id]));
  });

  // Se a pessoa já tem um nível preferido (escolhido alguma vez no Match
  // Infinito ou na Sessão), aplica o mesmo filtro de dificuldade aqui — sem
  // nunca ter perguntado nada, só respeitando o que ela já indicou querer.
  if(state.preferredLevel === 'beginner'){
    pool = pool.filter(([kr, pt]) => kr.length <= 5 && pt.length <= 18);
  } else if(state.preferredLevel === 'intermediate'){
    pool = pool.filter(([kr]) => kr.length <= 9);
  }

  if(pool.length === 0){
    // Ainda não há nenhum tema desbloqueado (caso raríssimo, só se Café também
    // estivesse bloqueado) — cai no Café como garantia de sempre ter conteúdo.
    startMatchSession('cafe');
    return;
  }

  const shuffled = shuffleArray(pool);
  const roundWords = shuffled.slice(0, Math.min(ROUND_SIZE, shuffled.length));
  // Mapa kr -> tema de origem, pra registrar o progresso no tema certo
  // (e não tudo sob um tema fake "quicktrain" que perderia a continuidade).
  const originMap = {};
  roundWords.forEach(([kr, , originThemeId]) => { originMap[kr] = originThemeId; });
  const ptMap = {};
  roundWords.forEach(([kr, pt]) => { ptMap[kr] = pt; });

  currentMatchSession = {
    themeId: 'quicktrain',
    themeName: 'Treino rápido',
    themeEmoji: '⚡',
    totalGoal: roundWords.length,
    queue: roundWords.slice(5).map(([kr,pt])=>[kr,pt]),
    pairs: roundWords.slice(0, 5).map(([kr,pt])=>[kr,pt]),
    matchedKr: [],
    selectedKr: null,
    selectedPt: null,
    flowersEarned: 0,
    wordsLearnedThisRound: [],
    isQuickTrain: true,
    originMap, // kr -> themeId real, usado por markWordLearned
    ptMap,
  };

  goTo('match');
}


// Escolhe a classe de tamanho de fonte com base no comprimento da palavra/frase coreana.
// Usa Array.from para contar caracteres Unicode corretamente (não bytes).
function krSizeClass(kr){
  const len = Array.from(kr.replace(/\s/g,'')).length;
  if(len <= 3) return 'kr-short';
  if(len <= 5) return 'kr-medium';
  if(len <= 7) return 'kr-long';
  return 'kr-phrase';
}

function makeMatchKrCard(kr){
  const card = document.createElement('button');
  card.className = 'match-card kr fade-in ' + krSizeClass(kr);
  card.dataset.kr = kr;
  const audioIcon = state.soundOn ? `<span class="match-card-audio">▶</span>` : '';
  card.innerHTML = `<span>${escapeHtml(kr)}</span>${audioIcon}`;
  card.addEventListener('click', ()=> onSelectKr(kr, card));
  return card;
}

// Escolhe a classe de tamanho de fonte para o lado PT com base no comprimento da tradução.
function ptSizeClass(pt){
  const len = pt.length;
  // Considera também a maior "palavra" sem espaço (ex: "Tessalonicenses" sozinha
  // já é larga demais pro card, mesmo que o texto total "1 Tessalonicenses" seja curto).
  const longestWord = pt.split(/[\s/]+/).reduce((a,b) => b.length > a.length ? b : a, '');
  const effectiveLen = Math.max(len, longestWord.length * 1.7);
  if(effectiveLen <= 18) return '';          // curto: 17px padrão
  if(effectiveLen <= 28) return 'pt-medium'; // médio: 15px
  if(effectiveLen <= 38) return 'pt-long';   // longo: 13px
  return 'pt-xlong';                         // muito longo: 12px
}

function makeMatchPtCard(kr, pt){
  const card = document.createElement('button');
  card.className = 'match-card pt fade-in ' + ptSizeClass(pt);
  card.dataset.pt = pt;
  card.dataset.forKr = kr;
  card.textContent = pt;
  card.addEventListener('click', ()=> onSelectPt(pt, kr, card));
  return card;
}

function addNextMatchPair(krCard, ptCard, resolvedKr){
  const session = currentMatchSession;
  if(!session) return;

  // Remove o par recém-resolvido da lista de pares visíveis (fonte de verdade),
  // ou a lógica de match quebra a partir da segunda reposição.
  if(resolvedKr){
    const idx = session.pairs.findIndex(p => p[0] === resolvedKr);
    if(idx !== -1) session.pairs.splice(idx, 1);
  }

  if(!session.queue || session.queue.length === 0) return;
  const nextPair = session.queue.shift();
  const [newKr, newPt] = nextPair;
  session.pairs.push([newKr, newPt]);

  // Os dois cards novos (coreano e português) NUNCA devem entrar no mesmo instante visual.
  // Se entrarem juntos, dá pra "ver" qual par é o novo só pelo sincronismo, sem precisar
  // ler nada — então cada lado recebe seu próprio atraso aleatório e independente,
  // com uma diferença mínima forçada entre os dois. A janela é curta de propósito:
  // o objetivo é um fluxo rápido e contínuo (estilo Match Madness do Duolingo), não uma pausa.
  const baseDelay = 40 + Math.floor(Math.random()*60); // 40–100ms
  const minGap = 35; // garante que os dois lados nunca entrem juntos, mesmo por coincidência
  const krFirst = Math.random() < 0.5; // varia quem entra primeiro a cada rodada
  const krDelay = krFirst ? baseDelay : baseDelay + minGap;
  const ptDelay = krFirst ? baseDelay + minGap : baseDelay;

  if(krCard){
    krCard.classList.add('fade-out');
    setTimeout(()=>{
      const newKrCard = makeMatchKrCard(newKr);
      krCard.replaceWith(newKrCard);
      randomizeCardPosition(newKrCard);
    }, krDelay);
  }
  if(ptCard){
    ptCard.classList.add('fade-out');
    setTimeout(()=>{
      const newPtCard = makeMatchPtCard(newKr, newPt);
      ptCard.replaceWith(newPtCard);
      randomizeCardPosition(newPtCard);
    }, ptDelay);
  }
  const maxDelay = Math.max(krDelay, ptDelay) + 80;
  setTimeout(()=>{
    const colKr = document.querySelector('#colKr');
    const colPt = document.querySelector('#colPt');
    if(colKr && colPt) syncMatchCardHeights(colKr, colPt);
  }, maxDelay);
}

// Move um card recém-inserido para uma posição aleatória dentro da sua própria coluna,
// quebrando a correlação posicional entre o lado coreano e o lado português.
function randomizeCardPosition(cardEl){
  const col = cardEl.parentElement;
  if(!col) return;
  const siblings = Array.from(col.children).filter(c => c !== cardEl);
  if(siblings.length === 0) return;
  const targetIndex = Math.floor(Math.random() * (siblings.length + 1));
  if(targetIndex >= siblings.length){
    col.appendChild(cardEl);
  } else {
    col.insertBefore(cardEl, siblings[targetIndex]);
  }
}


function renderMatchScreen(){
  const session = currentMatchSession;
  if(!session){ goTo('home'); return; }

  const el = document.createElement('div');
  el.className = 'screen match-screen';

  const totalPairs = session.totalGoal || session.pairs.length;
  const doneCount = session.matchedKr.length;
  const progressPct = Math.round((doneCount/totalPairs)*100);

  el.innerHTML = `
    <div class="match-progress">
      <button class="match-close" id="matchClose">✕</button>
      <div class="match-progress-track"><div class="match-progress-fill" style="width:${progressPct}%"></div></div>
      <div class="match-progress-count">${doneCount}/${totalPairs}</div>
    </div>
    <div class="match-board">
      <div class="match-col" id="colKr"></div>
      <div class="match-col" id="colPt"></div>
    </div>
  `;
  app.appendChild(el);

  el.querySelector('#matchClose').addEventListener('click', ()=>{
    currentMatchSession = null;
    goTo('home');
  });

  const colKr = el.querySelector('#colKr');
  const colPt = el.querySelector('#colPt');

  const shuffledKr = shuffleArray(session.pairs.map(p=>p[0]));

  shuffledKr.forEach(kr=>{
    colKr.appendChild(makeMatchKrCard(kr));
  });

  session.pairs.forEach(([kr, pt])=>{
    colPt.appendChild(makeMatchPtCard(kr, pt));
  });

  shuffleDomChildren(colPt);

  // Sincroniza altura entre cards da mesma posição nas duas colunas.
  // Sem isso, um card PT com texto longo fica maior que o KR na mesma linha — desalinhado.
  requestAnimationFrame(()=>{
    syncMatchCardHeights(colKr, colPt);
  });
}

function syncMatchCardHeights(colKr, colPt){
  const krCards = Array.from(colKr.children);
  const ptCards = Array.from(colPt.children);
  // Reseta alturas primeiro para medir o natural
  [...krCards, ...ptCards].forEach(c => c.style.minHeight = '');
  // Mapa de data-kr para index na coluna KR
  const krIndexMap = {};
  krCards.forEach((c, i) => { krIndexMap[c.dataset.kr] = i; });
  // Para cada card PT, encontra o KR correspondente por data-for-kr e equaliza
  ptCards.forEach(ptCard => {
    const forKr = ptCard.dataset.forKr;
    const krCard = krCards.find(c => c.dataset.kr === forKr);
    if(!krCard) return;
    const maxH = Math.max(krCard.offsetHeight, ptCard.offsetHeight);
    krCard.style.minHeight = maxH + 'px';
    ptCard.style.minHeight = maxH + 'px';
  });
}

function shuffleDomChildren(container){
  const children = Array.from(container.children);
  shuffleArray(children).forEach(c => container.appendChild(c));
}

function onSelectKr(kr, cardEl){
  const session = currentMatchSession;
  if(!session) return;
  // Blindagem: ignora cliques em um card que já está saindo da tela ou que não
  // está mais conectado ao DOM (pode acontecer numa janela muito curta durante a troca rápida de pares).
  if(!cardEl.isConnected || cardEl.classList.contains('fade-out')) return;
  document.querySelectorAll('.match-card.kr.selected').forEach(c=>c.classList.remove('selected'));
  cardEl.classList.add('selected');
  session.selectedKr = kr;
  speakKorean(kr);
  tryResolveMatch();
}

function onSelectPt(pt, forKr, cardEl){
  const session = currentMatchSession;
  if(!session) return;
  if(!cardEl.isConnected || cardEl.classList.contains('fade-out')) return;
  document.querySelectorAll('.match-card.pt.selected').forEach(c=>c.classList.remove('selected'));
  cardEl.classList.add('selected');
  session.selectedPt = pt;
  session.selectedPtForKr = forKr;
  tryResolveMatch();
}

function tryResolveMatch(){
  const session = currentMatchSession;
  if(!session.selectedKr || !session.selectedPt) return;

  const correctPair = session.pairs.find(p => p[0] === session.selectedKr);
  const isCorrect = correctPair && correctPair[1] === session.selectedPt;

  const krCard = document.querySelector(`.match-card.kr[data-kr="${cssEscape(session.selectedKr)}"]`);
  const ptCard = document.querySelector(`.match-card.pt.selected`);

  if(isCorrect) handleCorrectMatch(session, krCard, ptCard);
  else handleWrongMatch(session, krCard, ptCard);

  session.selectedKr = null;
  session.selectedPt = null;
}

function cssEscape(str){
  if(window.CSS && CSS.escape) return CSS.escape(str);
  return str.replace(/[^a-zA-Z0-9_\u00A0-\uFFFF-]/g, '\\$&');
}

function handleCorrectMatch(session, krCard, ptCard){
  const kr = session.selectedKr;
  session.matchedKr.push(kr);
  // No treino instantâneo, cada palavra "pertence" a um tema real diferente —
  // o progresso precisa contar lá, não embaixo de um tema fake "quicktrain".
  const realThemeId = (session.originMap && session.originMap[kr]) || session.themeId;
  markWordLearned(realThemeId, kr);
  if(!session.wordsLearnedThisRound.includes(kr)) session.wordsLearnedThisRound.push(kr);

  playMatchSound('correct');
  burstPetalsFrom(krCard);

  if(krCard) krCard.classList.add('matched');
  if(ptCard) ptCard.classList.add('matched');

  addFlowers(2);
  session.flowersEarned += 2;
  saveState();

  // Mensagem de incentivo a cada 3 acertos — não toda hora pra não virar ruído,
  // mas frequente o suficiente pra dar aquela sensação de "estou indo bem".
  if(session.matchedKr.length % 3 === 0){
    showEncouragement(randomPhrase(themedCorrectPhrase(session.isQuickTrain ? realThemeId : session.themeId)));
  }

  setTimeout(()=>{
    updateMatchProgressBar();
    if(session.matchedKr.length >= (session.totalGoal || session.pairs.length)){
      finishMatchSession();
    } else if(session.queue && session.queue.length > 0){
      addNextMatchPair(krCard, ptCard, kr);
    } else {
      // Fila vazia (faltam menos de 5 palavras pra terminar a rodada): em vez de
      // deixar o card "preso" verde esperando o resto da rodada, ele some da tela
      // com a mesma transição suave de sempre — o board vai encolhendo aos poucos
      // até a tela final aparecer, em vez de acumular cards verdes parados.
      const idx = session.pairs.findIndex(p => p[0] === kr);
      if(idx !== -1) session.pairs.splice(idx, 1);
      if(krCard){
        krCard.classList.add('fade-out');
        setTimeout(()=> krCard.remove(), 200);
      }
      if(ptCard){
        ptCard.classList.add('fade-out');
        setTimeout(()=> ptCard.remove(), 200);
      }
    }
  }, 260);
}

function handleWrongMatch(session, krCard, ptCard){
  if(session) session.misses = (session.misses || 0) + 1;
  playMatchSound('wrong');
  [krCard, ptCard].forEach(c=>{
    if(!c) return;
    c.classList.remove('selected');
    c.classList.add('wrong');
    setTimeout(()=> c.classList.remove('wrong'), 420);
  });
}

function updateMatchProgressBar(){
  const session = currentMatchSession;
  const fill = document.querySelector('.match-progress-fill');
  const count = document.querySelector('.match-progress-count');
  if(fill) fill.style.width = Math.round((session.matchedKr.length/(session.totalGoal || session.pairs.length))*100)+'%';
  if(count) count.textContent = `${session.matchedKr.length}/${session.totalGoal || session.pairs.length}`;
}

function randomPhrase(arr){ return arr[Math.floor(Math.random()*arr.length)]; }

// ============================================
// SONS via Web Audio API — sem arquivos externos
// Gera tons sintéticos leves: acerto = arpejo suave, erro = tom descendente curto.
// ============================================
let audioCtx = null;
function getAudioCtx(){
  if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function playMatchSound(type){
  if(!state.soundOn) return;
  try {
    const ctx = getAudioCtx();
    if(type === 'correct'){
      // Arpejo suave ascendente: duas notas rápidas (estilo "ding-ding!")
      [[0, 880, 0.12], [0.1, 1108, 0.10]].forEach(([when, freq, gain])=>{
        const osc = ctx.createOscillator();
        const env = ctx.createGain();
        osc.connect(env); env.connect(ctx.destination);
        osc.type = 'sine';
        osc.frequency.value = freq;
        env.gain.setValueAtTime(gain, ctx.currentTime + when);
        env.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + when + 0.22);
        osc.start(ctx.currentTime + when);
        osc.stop(ctx.currentTime + when + 0.25);
      });
    } else {
      // Tom descendente curto: "bom-bom" grave
      const osc = ctx.createOscillator();
      const env = ctx.createGain();
      osc.connect(env); env.connect(ctx.destination);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(320, ctx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(180, ctx.currentTime + 0.18);
      env.gain.setValueAtTime(0.13, ctx.currentTime);
      env.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.22);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + 0.25);
    }
  } catch(e){ /* contexto de áudio bloqueado, ignora silenciosamente */ }
}

// Pétalas de cerejeira explodindo do card acertado — mais quantidade e variedade
function burstPetalsFrom(el){
  if(!el) return;
  const rect = el.getBoundingClientRect();
  const cx = rect.left + rect.width/2;
  const cy = rect.top + rect.height/2;
  const emojis = ['🌸','🌸','🌸','✨','🌷','🌸'];
  const sizes  = ['18px','20px','22px','16px','20px','22px'];
  for(let i = 0; i < 9; i++){
    const p = document.createElement('div');
    p.className = 'burst-petal';
    const emoji = emojis[i % emojis.length];
    p.textContent = emoji;
    p.style.fontSize = sizes[i % sizes.length];
    p.style.left = (cx + (Math.random()-0.5)*20)+'px';
    p.style.top  = (cy + (Math.random()-0.5)*10)+'px';
    const angle = (i / 9) * Math.PI * 2 + (Math.random()-0.5)*0.7;
    const dist  = 55 + Math.random()*70;
    p.style.setProperty('--bx', (Math.cos(angle)*dist)+'px');
    p.style.setProperty('--by', (Math.sin(angle)*dist - 60)+'px');
    p.style.setProperty('--br', (Math.random()*300 - 150)+'deg');
    p.style.animationDelay = (i * 28)+'ms';
    document.body.appendChild(p);
    setTimeout(()=> p.remove(), 900 + i*28);
  }
}

function finishMatchSession(){ goTo('complete'); }


// ============================================
// JOGO RÁPIDO — modo arcade sem flores
// ============================================
let quickGame = null;
let quickTimer = null;

function allWordsFlat(){
  const items = [];
  // Temas marcados com excludeFromGeneric (ex: Fé, Bíblia) não entram no pool
  // genérico do Jogo Rápido / Match Infinito — só aparecem se a pessoa escolher
  // o tema diretamente no Match normal. Conteúdo religioso não deve "surpreender"
  // quem está jogando um modo aleatório sem ter escolhido esse tema.
  visibleThemeList().forEach(theme=>{
    if(theme.excludeFromGeneric) return;
    theme.words.forEach(([kr, pt])=>{
      items.push({kr, pt, themeId:theme.id, themeName:theme.name, emoji:theme.emoji, dorama:!!theme.dorama});
    });
  });
  return items;
}

function startQuickGame(){
  quickGame = {
    active:true,
    score:0,
    round:0,
    timeLimit:10000,
    timeLeft:10000,
    current:null,
    options:[],
    best:Number(localStorage.getItem('oicoreia_quick_best') || 0)
  };
  nextQuickQuestion();
}

function stopQuickTimer(){
  if(quickTimer){
    clearInterval(quickTimer);
    quickTimer = null;
  }
}

function nextQuickQuestion(){
  stopQuickTimer();
  if(!quickGame) return;

  const pool = allWordsFlat();
  const current = pool[Math.floor(Math.random()*pool.length)];

  // Escolhe distratores com comprimento de texto PARECIDO com a resposta certa.
  // Sem isso, uma resposta longa ("Estou ansioso(a)/com borboletas no estômago")
  // ao lado de distratores curtos ("Água", "Pão") fica óbvia só pelo tamanho do texto,
  // sem precisar ler nada — o que destrói o propósito do jogo.
  const candidates = pool.filter(item => item.pt !== current.pt);
  const targetLen = current.pt.length;
  const byCloseness = shuffleArray(candidates).sort((a, b) => {
    return Math.abs(a.pt.length - targetLen) - Math.abs(b.pt.length - targetLen);
  });
  const wrongs = byCloseness.slice(0, 3);
  const options = shuffleArray([current, ...wrongs]);

  quickGame.current = current;
  quickGame.options = options;
  quickGame.round += 1;
  quickGame.timeLimit = 10000;
  quickGame.timeLeft = quickGame.timeLimit;

  window.__route = 'quickgame';
  render();

  const startedAt = Date.now();
  quickTimer = setInterval(()=>{
    if(!quickGame || !quickGame.active){
      stopQuickTimer();
      return;
    }
    quickGame.timeLeft = Math.max(0, quickGame.timeLimit - (Date.now() - startedAt));
    const fill = document.querySelector('.quick-timer-fill');
    if(fill){
      fill.style.width = Math.max(0, (quickGame.timeLeft / quickGame.timeLimit) * 100) + '%';
    }
    if(quickGame.timeLeft <= 0){
      finishQuickGame();
    }
  }, 80);
}

function finishQuickGame(){
  stopQuickTimer();
  if(!quickGame) return;
  quickGame.active = false;
  const best = Number(localStorage.getItem('oicoreia_quick_best') || 0);
  if(quickGame.score > best){
    localStorage.setItem('oicoreia_quick_best', String(quickGame.score));
    quickGame.best = quickGame.score;
  } else {
    quickGame.best = best;
  }
  render();
}

function chooseQuickOption(pt, btn){
  if(!quickGame || !quickGame.active) return;
  const correct = quickGame.current && pt === quickGame.current.pt;

  if(correct){
    playMatchSound('correct');
    if(btn) btn.classList.add('correct');
    quickGame.score += 1;
    speakKorean(quickGame.current.kr);
    setTimeout(()=> nextQuickQuestion(), 180);
  } else {
    playMatchSound('wrong');
    if(btn) btn.classList.add('wrong');
    document.querySelectorAll('.quick-option').forEach(option=>{
      if(option.dataset.pt === quickGame.current.pt) option.classList.add('correct');
    });
    setTimeout(()=> finishQuickGame(), 450);
  }
}

// ============================================
// MATCH INFINITO — estilo Duolingo
// ============================================
let infiniteGame = null;

// Fonte central de emoji/label por nível — usada no indicador da tela Treinar,
// no modal de troca rápida, e em qualquer outro lugar que precise mostrar o
// nível de forma consistente.
const LEVEL_META = {
  beginner: { emoji:'🌱', label:'Iniciante' },
  intermediate: { emoji:'🌿', label:'Intermediário' },
  advanced: { emoji:'🌳', label:'Avançado' },
};

function getWordsByLevel(level){
  const all = allWordsFlat();
  if(level === 'beginner'){
    return all.filter(w => w.kr.length <= 5 && w.pt.length <= 18);
  }
  if(level === 'intermediate'){
    return all.filter(w => w.kr.length <= 9);
  }
  return all;
}

function startInfiniteMatch(level){
  // Guarda como preferência — assim a próxima vez (em qualquer modo que use
  // nível) já vem calibrada, sem precisar perguntar de novo.
  state.preferredLevel = level || 'beginner';
  saveState();

  const pool = shuffleArray(getWordsByLevel(level || 'beginner'));
  infiniteGame = {
    active:true,
    level:level || 'beginner',
    pool,
    index:0,
    pairs:[],
    selectedKr:null,
    selectedPt:null,
    hits:0,
    misses:0,
    combo:0,
    maxCombo:0,
    lives:3,
    gameOver:false,
    best:Number(localStorage.getItem('oicoreia_infinite_best') || 0),
    bestCombo:Number(localStorage.getItem('oicoreia_infinite_best_combo') || 0)
  };
  for(let i=0;i<5;i++) addInfinitePair();
  goTo('infinite');
}

// Modo Sessão: mesma engine do Match Infinito (board de 5, reposição contínua),
// mas sem vidas — a sessão só termina quando o tempo escolhido acaba. Pensado
// pro uso casual de "tenho 15 minutinhos, quero só treinar sem me preocupar
// com errar". Misturamos todos os temas acessíveis, exceto Fé/Bíblia (mesma
// regra do treino instantâneo — conteúdo sensível só entra se escolhido direto).
let sessionTimer = null;

function startSessionMode(minutes){
  const accessibleThemes = THEMES.filter(t => isThemeAccessible(t) && !t.excludeFromGeneric);
  let pool = [];
  accessibleThemes.forEach(theme=>{
    theme.words.forEach(([kr, pt])=> pool.push({kr, pt, themeId:theme.id}));
  });

  // Mesmo filtro de nível preferido do Match Infinito e do Treino instantâneo —
  // sempre opcional, nunca perguntado, só aplicado se a pessoa já indicou antes.
  if(state.preferredLevel === 'beginner'){
    pool = pool.filter(w => w.kr.length <= 5 && w.pt.length <= 18);
  } else if(state.preferredLevel === 'intermediate'){
    pool = pool.filter(w => w.kr.length <= 9);
  }

  if(pool.length === 0){
    THEMES.find(t=>t.id==='cafe').words.forEach(([kr,pt])=> pool.push({kr,pt,themeId:'cafe'}));
  }

  infiniteGame = {
    active:true,
    sessionMode:true,
    sessionMinutes:minutes,
    sessionSecondsLeft: minutes * 60,
    pool: shuffleArray(pool),
    index:0,
    pairs:[],
    selectedKr:null,
    selectedPt:null,
    hits:0,
    misses:0,
    combo:0,
    maxCombo:0,
    lives:null, // sessão não usa vidas — errar não termina a sessão
    gameOver:false,
    best:0,
    bestCombo:0,
  };
  for(let i=0;i<5;i++) addInfinitePair();

  clearInterval(sessionTimer);
  sessionTimer = setInterval(()=>{
    if(!infiniteGame || !infiniteGame.active || !infiniteGame.sessionMode){
      clearInterval(sessionTimer);
      return;
    }
    infiniteGame.sessionSecondsLeft -= 1;
    updateSessionTimerDisplay();
    if(infiniteGame.sessionSecondsLeft <= 0){
      clearInterval(sessionTimer);
      finishInfiniteGame();
    }
  }, 1000);

  goTo('infinite');
}

function updateSessionTimerDisplay(){
  const el = document.getElementById('infSessionTime');
  if(!el || !infiniteGame) return;
  const s = Math.max(0, infiniteGame.sessionSecondsLeft);
  const mm = Math.floor(s/60).toString().padStart(2,'0');
  const ss = (s%60).toString().padStart(2,'0');
  el.textContent = `${mm}:${ss}`;
}

function addInfinitePair(){
  if(!infiniteGame) return;
  if(infiniteGame.index >= infiniteGame.pool.length){
    // Modo sessão usa o pool misturado já montado em startSessionMode;
    // modo normal (níveis) recalcula a partir de getWordsByLevel.
    infiniteGame.pool = infiniteGame.sessionMode
      ? shuffleArray(infiniteGame.pool)
      : shuffleArray(getWordsByLevel(infiniteGame.level));
    infiniteGame.index = 0;
  }
  const next = infiniteGame.pool[infiniteGame.index++];
  if(next && !infiniteGame.pairs.some(p => p.kr === next.kr)){
    infiniteGame.pairs.push(next);
  } else if(next){
    addInfinitePair();
  }
}


function renderLives(lives){
  const full = Math.max(0, lives || 0);
  return '❤️'.repeat(full) + '🤍'.repeat(Math.max(0, 3 - full));
}

function showInfiniteErrorToast(text){
  let toast = document.getElementById('infiniteErrorToast');
  if(!toast){
    toast = document.createElement('div');
    toast.id = 'infiniteErrorToast';
    toast.className = 'infinite-error-toast';
    document.body.appendChild(toast);
  }
  toast.textContent = text;
  toast.classList.add('show');
  clearTimeout(window.__infiniteErrorTimer);
  window.__infiniteErrorTimer = setTimeout(()=>toast.classList.remove('show'), 900);
}

function finishInfiniteGame(){
  if(!infiniteGame) return;
  clearInterval(sessionTimer);
  infiniteGame.active = false;
  infiniteGame.gameOver = true;
  // Recordes de "acertos" e "combo" são específicos do Match Infinito (modo
  // performance) — não fazem sentido pro modo Sessão, que é sobre tempo livre,
  // não sobre bater placar.
  if(!infiniteGame.sessionMode){
    if(infiniteGame.hits > Number(localStorage.getItem('oicoreia_infinite_best') || 0)){
      localStorage.setItem('oicoreia_infinite_best', String(infiniteGame.hits));
    }
    if((infiniteGame.maxCombo || 0) > Number(localStorage.getItem('oicoreia_infinite_best_combo') || 0)){
      localStorage.setItem('oicoreia_infinite_best_combo', String(infiniteGame.maxCombo || 0));
    }
  }
  render();
}

function selectInfiniteKr(kr, btn){
  if(!infiniteGame) return;
  document.querySelectorAll('.infinite-card.kr.selected').forEach(c=>c.classList.remove('selected'));
  btn.classList.add('selected');
