  resolveInfinite();
}

function selectInfinitePt(pt, forKr, btn){
  if(!infiniteGame) return;
  document.querySelectorAll('.infinite-card.pt.selected').forEach(c=>c.classList.remove('selected'));
  btn.classList.add('selected');
  infiniteGame.selectedPt = pt;
  infiniteGame.selectedPtForKr = forKr;
  resolveInfinite();
}

function updateInfiniteStats(){
  if(!infiniteGame) return;
  const hits = document.getElementById('infHits');
  const combo = document.getElementById('infCombo');
  if(hits) hits.textContent = infiniteGame.hits;
  if(combo) combo.textContent = infiniteGame.combo;
  if(infiniteGame.sessionMode){
    updateSessionTimerDisplay();
  } else {
    const lives = document.getElementById('infLives');
    if(lives) lives.textContent = renderLives(infiniteGame.lives);
  }
}

function attachInfiniteCardEvents(root=document){
  root.querySelectorAll('.infinite-card.kr').forEach(btn=>{
    btn.onclick = ()=> selectInfiniteKr(btn.dataset.kr, btn);
  });
  root.querySelectorAll('.infinite-card.pt').forEach(btn=>{
    btn.onclick = ()=> selectInfinitePt(btn.dataset.pt, btn.dataset.forKr, btn);
  });
}

function makeInfiniteKrCard(item){
  const btn = document.createElement('button');
  btn.className = 'infinite-card kr fade-in ' + krSizeClass(item.kr);
  btn.dataset.kr = item.kr;
  const audioLabel = state.soundOn ? `<span class="infinite-small-audio">▶ ouvir</span>` : '';
  btn.innerHTML = `<span>${escapeHtml(item.kr)}</span>${audioLabel}`;
  btn.onclick = ()=> selectInfiniteKr(btn.dataset.kr, btn);
  return btn;
}

function makeInfinitePtCard(item){
  const btn = document.createElement('button');
  btn.className = 'infinite-card pt fade-in';
  btn.dataset.pt = item.pt;
  btn.dataset.forKr = item.kr;
  btn.textContent = item.pt;
  btn.onclick = ()=> selectInfinitePt(btn.dataset.pt, btn.dataset.forKr, btn);
  return btn;
}

function resolveInfinite(){
  if(!infiniteGame || !infiniteGame.selectedKr || !infiniteGame.selectedPt) return;

  const isCorrect = infiniteGame.selectedKr === infiniteGame.selectedPtForKr;
  const kr = infiniteGame.selectedKr;
  const pt = infiniteGame.selectedPt;
  const krCard = document.querySelector(`.infinite-card.kr[data-kr="${cssEscape(kr)}"]`);
  const ptCard = document.querySelector(`.infinite-card.pt[data-pt="${cssEscape(pt)}"]`);

  if(isCorrect){
    playMatchSound('correct');
    burstPetalsFrom(krCard);
    if(krCard) krCard.classList.add('correct');
    if(ptCard) ptCard.classList.add('correct');

    infiniteGame.hits += 1;
    infiniteGame.combo += 1;
    infiniteGame.maxCombo = Math.max(infiniteGame.maxCombo || 0, infiniteGame.combo);
    if(infiniteGame.combo > (infiniteGame.bestCombo || 0)){
      infiniteGame.bestCombo = infiniteGame.combo;
      localStorage.setItem('oicoreia_infinite_best_combo', String(infiniteGame.bestCombo));
    }
    if(infiniteGame.hits > infiniteGame.best){
      infiniteGame.best = infiniteGame.hits;
      localStorage.setItem('oicoreia_infinite_best', String(infiniteGame.best));
    }

    // Mesma cadência do Match normal: incentivo a cada 3 acertos
    if(infiniteGame.hits % 3 === 0){
      showEncouragement(randomPhrase(PHRASES_GENERIC));
    }

    updateInfiniteStats();

    infiniteGame.pairs = infiniteGame.pairs.filter(p => p.kr !== kr);
    addInfinitePair();
    const newPair = infiniteGame.pairs[infiniteGame.pairs.length - 1];

    infiniteGame.selectedKr = null;
    infiniteGame.selectedPt = null;

    // Mesmo princípio do Match normal: fluxo rápido e contínuo, com os dois lados
    // entrando em instantes levemente diferentes pra não criar uma "dica" visual de sincronismo.
    if(krCard) krCard.classList.add('fade-out');
    if(ptCard) ptCard.classList.add('fade-out');

    const infBase = 40 + Math.floor(Math.random()*60); // 40–100ms
    const infGap = 35;
    const infKrFirst = Math.random() < 0.5;
    const infKrDelay = infKrFirst ? infBase : infBase + infGap;
    const infPtDelay = infKrFirst ? infBase + infGap : infBase;

    if(krCard && newPair){
      setTimeout(()=>{
        const newKr = makeInfiniteKrCard(newPair);
        krCard.replaceWith(newKr);
        randomizeCardPosition(newKr);
      }, infKrDelay);
    }
    if(ptCard && newPair){
      setTimeout(()=>{
        const newPt = makeInfinitePtCard(newPair);
        ptCard.replaceWith(newPt);
        randomizeCardPosition(newPt);
      }, infPtDelay);
    }

  } else {
    infiniteGame.misses += 1;
    infiniteGame.combo = 0;

    // No modo Sessão não há vidas — errar só reseta o combo e mostra o feedback
    // visual de erro, sem punir além disso. É treino casual, não teste de performance.
    if(!infiniteGame.sessionMode){
      infiniteGame.lives = Math.max(0, (infiniteGame.lives || 0) - 1);
    }
    updateInfiniteStats();

    playMatchSound('wrong');
    if(!infiniteGame.sessionMode){
      showInfiniteErrorToast(infiniteGame.lives > 0 ? `Ops! ${infiniteGame.lives} vida(s) restantes` : 'Fim de jogo!');
      const livesPill = document.getElementById('infLivesPill');
      if(livesPill){
        livesPill.classList.remove('infinite-life-lost');
        void livesPill.offsetWidth;
        livesPill.classList.add('infinite-life-lost');
      }
    }

    if(krCard) krCard.classList.add('wrong');
    if(ptCard) ptCard.classList.add('wrong');

    if(!infiniteGame.sessionMode && infiniteGame.lives <= 0){
      setTimeout(()=> finishInfiniteGame(), 650);
      return;
    }

    setTimeout(()=>{
      document.querySelectorAll('.infinite-card.selected,.infinite-card.wrong').forEach(c=>{
        c.classList.remove('selected','wrong');
      });
      infiniteGame.selectedKr = null;
      infiniteGame.selectedPt = null;
    }, 420);
  }
}

function renderCompleteScreen(){
  const session = currentMatchSession;
  if(!session){ goTo('home'); return; }

  const el = document.createElement('div');
  el.className = 'screen complete-screen complete';

  const justUnlocked = THEMES.filter(t => t.unlockFlowers > 0 &&
    state.flowers >= t.unlockFlowers &&
    (state.flowers - session.flowersEarned) < t.unlockFlowers
  );

  const wordsChips = session.wordsLearnedThisRound.map(kr=>{
    const pt = (session.ptMap && session.ptMap[kr]) ||
      (session.pairs.find(p=>p[0]===kr) || [])[1] || '';
    return `<div class="complete-word-chip"><span class="kr">${kr}</span><span>${escapeHtml(pt)}</span></div>`;
  }).join('');

  // Indicador leve de aproveitamento — pro uso de "deixa eu testar o que já sei",
  // não é nota nem avaliação de curso, só um termômetro casual do momento.
  const totalAttempts = session.matchedKr.length + (session.misses || 0);
  const accuracyPct = totalAttempts > 0 ? Math.round((session.matchedKr.length/totalAttempts)*100) : null;
  const accuracyTone = accuracyPct === null ? '' : accuracyPct >= 90 ? 'Mandou muito bem hoje.' :
    accuracyPct >= 70 ? 'Bom treino!' : 'Valeu por treinar — repetição é assim mesmo.';

  el.innerHTML = `
    <div class="complete-emoji">🌸</div>
    <div class="complete-title">Treino concluído ✨</div>
    <div class="complete-desc">${session.themeEmoji} ${escapeHtml(session.themeName)}<br>${session.wordsLearnedThisRound.length} palavras revisadas</div>

    ${accuracyPct !== null ? `
    <div class="complete-accuracy">
      <span class="complete-accuracy-pct">${accuracyPct}%</span>
      <span class="complete-accuracy-label">de acerto hoje · ${accuracyTone}</span>
    </div>
    ` : ''}

    ${justUnlocked.map(t => `<div class="complete-unlock-banner">${t.name} foi desbloqueada! ${t.emoji}</div>`).join('')}

    <div class="complete-flowers">+${session.flowersEarned} 🌸</div>

    <div class="complete-words">${wordsChips}</div>

    <button class="btn btn-primary btn-block" id="btnContinue">Continuar</button>
    <button class="btn btn-ghost" id="btnPlayAgain">Próxima rodada</button>
  `;
  app.appendChild(el);

  el.querySelector('#btnContinue').addEventListener('click', ()=>{
    currentMatchSession = null;
    goTo('home');
  });
  el.querySelector('#btnPlayAgain').addEventListener('click', ()=>{
    const themeId = session.themeId;
    currentMatchSession = null;
    startMatchSession(themeId);
  });
}

function renderProfile(){
  const el = document.createElement('div');
  el.className = 'screen profile';

  const learned = totalWordsLearned();
  const unlockedThemes = THEMES.filter(t => isThemeAccessible(t)).length;
  const accessibleTotal = THEMES.filter(t => !isPlusLocked(t)).length;
  const sinceDate = new Date(state.createdAt);
  const sinceStr = sinceDate.toLocaleDateString('pt-BR', { month:'long', year:'numeric' });

  el.innerHTML = `
    <div class="profile-header">
      <div class="profile-avatar">🌷</div>
      <div class="profile-name">${escapeHtml(state.name)}</div>
      <div class="profile-since">Aprendendo coreano desde ${sinceStr}</div>
      ${state.isPlus ? `<div class="plus-badge" style="margin-top:10px;">✨ Plus</div>` : ''}
    </div>

    <div class="profile-stats">
      <div class="profile-stat"><div class="profile-stat-value">${learned}</div><div class="profile-stat-label">Palavras<br>aprendidas</div></div>
      <div class="profile-stat"><div class="profile-stat-value">${state.flowers}</div><div class="profile-stat-label">Flores<br>coletadas</div></div>
      <div class="profile-stat"><div class="profile-stat-value">${unlockedThemes}/${accessibleTotal}</div><div class="profile-stat-label">Destinos<br>abertos</div></div>
    </div>

    <div class="section-label">Suas coleções</div>
    <div class="collection-list" id="collectionList"></div>

    ${bottomNavHtml('profile')}
  `;
  app.appendChild(el);

  const list = el.querySelector('#collectionList');
  THEMES.forEach(theme=>{
    const flowerLocked = !isThemeUnlocked(theme);
    const plusLocked = isPlusLocked(theme);
    const accessible = !flowerLocked && !plusLocked;
    const count = themeLearnedCount(theme.id);
    const pct = Math.round((count/theme.words.length)*100);
    const row = document.createElement('div');
    row.className = 'collection-row' + (accessible ? '' : ' locked');
    row.innerHTML = `
      <div class="collection-emoji">${theme.emoji}</div>
      <div class="collection-info">
        <div class="collection-name">${theme.name} ${plusLocked ? '<span class=\"plus-badge\">✨ Plus</span>' : ''}</div>
        <div class="collection-progress-text">${accessible ? count+'/'+theme.words.length+' palavras' : (plusLocked ? 'Conteúdo Plus' : 'Bloqueado · '+theme.unlockFlowers+' 🌸')}</div>
      </div>
      <div class="collection-bar"><div class="collection-bar-fill" style="width:${accessible ? pct : 0}%"></div></div>
    `;
    if(plusLocked) row.addEventListener('click', ()=> goTo('plus', {from:'profile'}));
    list.appendChild(row);
  });

  attachBottomNav(el);
}

function renderSettings(){
  const el = document.createElement('div');
  el.className = 'screen settings';

  el.innerHTML = `
    <div class="topbar" style="padding-left:0; padding-right:0;">
      <div></div>
      <div class="topbar-title">Ajustes</div>
      <div></div>
    </div>

    <div class="settings-group">
      <div class="settings-row">
        <div>
          <div class="settings-row-label">Som e pronúncia</div>
          <div class="settings-row-desc">Ouvir as palavras em coreano</div>
        </div>
        <button class="toggle ${state.soundOn ? 'on' : ''}" id="toggleSound"><div class="toggle-knob"></div></button>
      </div>
    </div>

    <div class="settings-group">
      <div class="settings-row" id="rowChangeName" style="cursor:pointer;">
        <div>
          <div class="settings-row-label">Alterar nome</div>
          <div class="settings-row-desc">Atualmente: ${escapeHtml(state.name)}</div>
        </div>
        <span>✏️</span>
      </div>
    </div>

    <div class="settings-group">
      <div class="settings-row" id="rowPlusStatus" style="cursor:pointer;">
        <div>
          <div class="settings-row-label">${state.isPlus ? '✨ Oi Coreia Plus' : 'Oi Coreia Plus'}</div>
          <div class="settings-row-desc">${state.isPlus ? 'Pagamento único realizado · acesso vitalício' : 'Mais doramas, frases reais e vocabulário'}</div>
        </div>
        <span>${state.isPlus ? '✓' : '›'}</span>
      </div>
    </div>

    <div class="settings-group">
      <div class="settings-row" id="rowReset" style="cursor:pointer;">
        <div>
          <div class="settings-row-label danger-text">Reiniciar progresso</div>
          <div class="settings-row-desc">Apaga todas as palavras, flores e temas desbloqueados</div>
        </div>
        <span>🗑️</span>
      </div>
    </div>

    <div style="text-align:center; padding:20px 0; color:var(--ink-faint); font-size:12px; font-weight:500;">
      Oi Coreia · seus dados ficam salvos apenas neste dispositivo 🌸
    </div>

    ${bottomNavHtml('settings')}
  `;
  app.appendChild(el);

  el.querySelector('#toggleSound').addEventListener('click', (e)=>{
    state.soundOn = !state.soundOn;
    saveState();
    e.currentTarget.classList.toggle('on', state.soundOn);
    if(state.soundOn) speakKorean('안녕하세요');
  });

  el.querySelectorAll('[data-dorama-fav]').forEach(row=>{
    row.addEventListener('click', ()=>{
      const id = row.dataset.doramaFav;
      state.doramaFavorites = state.doramaFavorites || {};
      state.doramaFavorites[id] = state.doramaFavorites[id] === false ? true : false;
      saveState();
      render();
    });
  });

  el.querySelector('#rowChangeName').addEventListener('click', ()=> openRenameModal());
  el.querySelector('#rowPlusStatus').addEventListener('click', ()=> goTo('plus', {from:'settings'}));
  el.querySelector('#rowReset').addEventListener('click', ()=> openResetModal());

  attachBottomNav(el);
}

function openRenameModal(){
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `
    <div class="modal-box">
      <div class="modal-title">Alterar nome</div>
      <input type="text" class="onboard-input" id="renameInput" value="${escapeHtml(state.name)}" maxlength="20" style="margin-bottom:18px;">
      <div class="modal-actions">
        <button class="btn btn-secondary" id="cancelRename">Cancelar</button>
        <button class="btn btn-primary" id="confirmRename">Salvar</button>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);
  requestAnimationFrame(()=> overlay.classList.add('show'));
  const close = ()=>{ overlay.classList.remove('show'); setTimeout(()=>overlay.remove(), 250); };
  overlay.querySelector('#cancelRename').addEventListener('click', close);
  overlay.querySelector('#confirmRename').addEventListener('click', ()=>{
    const val = overlay.querySelector('#renameInput').value.trim();
    if(val){
      state.name = val;
      saveState();
      close();
      render();
    }
  });
}

function openResetModal(){
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `
    <div class="modal-box">
      <div class="modal-title">Reiniciar progresso?</div>
      <div class="modal-desc">Isso vai apagar todas as palavras aprendidas, flores e temas desbloqueados. Essa ação não pode ser desfeita.</div>
      <div class="modal-actions">
        <button class="btn btn-secondary" id="cancelReset">Cancelar</button>
        <button class="btn btn-primary" id="confirmReset" style="background:linear-gradient(135deg, var(--peach), var(--sakura-deep));">Reiniciar</button>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);
  requestAnimationFrame(()=> overlay.classList.add('show'));
  const close = ()=>{ overlay.classList.remove('show'); setTimeout(()=>overlay.remove(), 250); };
  overlay.querySelector('#cancelReset').addEventListener('click', close);
  overlay.querySelector('#confirmReset').addEventListener('click', ()=>{
    const keepName = state.name;
    state = defaultState();
    state.name = keepName;
    state.onboarded = true;
    saveState();
    close();
    showToast('Seu progresso foi reiniciado.');
    goTo('home');
  });
}

function openLevelPicker(){
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  const current = state.preferredLevel;
  overlay.innerHTML = `
    <div class="modal-box">
      <div class="modal-title">Seu nível</div>
      <div class="modal-desc">Isso ajusta o Treinar agora, a Sessão e o Match Infinito. Pode trocar quando quiser — nunca é obrigatório.</div>
      <div class="level-picker-options">
        <button class="level-picker-opt ${!current ? 'active' : ''}" data-level="">
          <span>🎚️</span> Misturado (todos os níveis)
        </button>
        <button class="level-picker-opt ${current==='beginner' ? 'active' : ''}" data-level="beginner">
          <span>🌱</span> Iniciante
        </button>
        <button class="level-picker-opt ${current==='intermediate' ? 'active' : ''}" data-level="intermediate">
          <span>🌿</span> Intermediário
        </button>
        <button class="level-picker-opt ${current==='advanced' ? 'active' : ''}" data-level="advanced">
          <span>🌳</span> Avançado
        </button>
      </div>
      <button class="btn btn-ghost" id="closeLevelPicker" style="margin-top:6px;">Fechar</button>
    </div>
  `;
  document.body.appendChild(overlay);
  requestAnimationFrame(()=> overlay.classList.add('show'));
  const close = ()=>{ overlay.classList.remove('show'); setTimeout(()=>overlay.remove(), 250); };
  overlay.querySelector('#closeLevelPicker').addEventListener('click', close);
  overlay.querySelectorAll('[data-level]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      state.preferredLevel = btn.dataset.level || null;
      saveState();
      close();
      render();
    });
  });
}

function init(){
  spawnPetalsBg();
  render();
}

init();

// Registra o service worker (necessário pra empacotar como PWA/TWA na Play Store).
// Roda em segundo plano, sem bloquear o carregamento do app.
if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('sw.js').catch(()=>{
      // Falha silenciosa: se o navegador não suportar ou o arquivo não existir
      // ainda (ex: testando localmente), o app continua funcionando normalmente.
    });
  });
}
