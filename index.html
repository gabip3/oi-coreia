
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#FBF6EF">
<title>Oi Coreia — Aprenda coreano brincando</title>
<meta name="description" content="Aprenda coreano brincando. Um jogo casual e acolhedor para brasileiros que amam a cultura coreana.">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌸</text></svg>">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Poppins:ital,wght@0,400;0,500;0,600;0,700;0,800;1,500&display=swap" rel="stylesheet">

<style>
/* ============================================
   OI COREIA — Design Tokens
   ============================================ */
:root{
  --cream:#FBF6EF;
  --cream-deep:#F3EBDD;
  --white:#FFFFFF;
  --sakura:#F4B8C4;
  --sakura-deep:#E8889A;
  --sage:#A8C3A0;
  --sage-deep:#7FA377;
  --peach:#F0A98E;
  --sky:#9FC9E8;
  --ink:#3A332E;
  --ink-soft:#6B6259;
  --ink-faint:#A39A8F;
  --gold:#E8B95F;

  --font-display:'Fredoka', sans-serif;
  --font-body:'Poppins', sans-serif;

  --r-sm:16px;
  --r-md:24px;
  --r-lg:32px;
  --r-xl:40px;

  --shadow-card: 0 4px 16px rgba(58,51,46,0.06), 0 1px 3px rgba(58,51,46,0.04);
  --shadow-float: 0 12px 32px rgba(58,51,46,0.12), 0 4px 8px rgba(58,51,46,0.06);
  --shadow-press: 0 2px 8px rgba(58,51,46,0.08);
}

*{box-sizing:border-box; margin:0; padding:0;}
html,body{height:100%;}
body{
  font-family:var(--font-body);
  background:var(--cream);
  color:var(--ink);
  overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
  -webkit-tap-highlight-color:transparent;
  user-select:none;
}
button{font-family:inherit; border:none; background:none; cursor:pointer; -webkit-tap-highlight-color:transparent;}
input{font-family:inherit;}
img,svg{display:block;}

@media (prefers-reduced-motion: reduce){
  *{animation-duration:0.01ms !important; animation-iteration-count:1 !important; transition-duration:0.01ms !important;}
}

#app{
  max-width:480px;
  margin:0 auto;
  min-height:100vh;
  position:relative;
  background:var(--cream);
  display:flex;
  flex-direction:column;
}

.screen{
  flex:1;
  display:flex;
  flex-direction:column;
  position:relative;
  min-height:100vh;
  animation:screenIn 0.45s cubic-bezier(0.16,1,0.3,1);
}
@keyframes screenIn{from{opacity:0; transform:translateY(12px);} to{opacity:1; transform:translateY(0);}}
.screen.hidden{display:none;}

.petals-bg{
  position:fixed;
  inset:0;
  pointer-events:none;
  overflow:hidden;
  z-index:0;
  max-width:480px;
  margin:0 auto;
}
.petal{
  position:absolute;
  top:-40px;
  font-size:18px;
  opacity:0.5;
  animation:fall linear infinite;
  filter:drop-shadow(0 1px 2px rgba(58,51,46,0.05));
}
@keyframes fall{
  0%{transform:translateY(0) translateX(0) rotate(0deg); opacity:0;}
  10%{opacity:0.55;}
  90%{opacity:0.4;}
  100%{transform:translateY(110vh) translateX(var(--drift,20px)) rotate(360deg); opacity:0;}
}

.korean{font-family:var(--font-display); font-weight:700; color:var(--ink); line-height:1.25;}
.eyebrow{
  font-family:var(--font-body);
  font-weight:600;
  font-size:13px;
  letter-spacing:0.06em;
  text-transform:uppercase;
  color:var(--ink-faint);
}

.btn{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  font-weight:700;
  font-size:18px;
  border-radius:999px;
  padding:18px 32px;
  transition:transform 0.15s ease, box-shadow 0.15s ease, filter 0.15s ease;
  box-shadow:var(--shadow-card);
}
.btn:active{transform:scale(0.96); box-shadow:var(--shadow-press);}
.btn-primary{background:linear-gradient(135deg, var(--sakura-deep), var(--peach)); color:var(--white);}
.btn-secondary{background:var(--white); color:var(--ink); border:2px solid var(--cream-deep);}
.btn-sage{background:linear-gradient(135deg, var(--sage-deep), var(--sage)); color:var(--white);}
.btn-block{width:100%;}
.btn-ghost{background:transparent; color:var(--ink-soft); font-weight:600; padding:12px 20px;}

.card{background:var(--white); border-radius:var(--r-lg); box-shadow:var(--shadow-card);}

.splash{
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:40px;
  position:relative;
  z-index:1;
}
.splash-mark{font-size:64px; margin-bottom:20px; animation:splashFloat 3s ease-in-out infinite;}
@keyframes splashFloat{0%,100%{transform:translateY(0) rotate(-4deg);} 50%{transform:translateY(-10px) rotate(4deg);}}
.splash-logo{font-family:var(--font-display); font-size:44px; font-weight:700; color:var(--ink); margin-bottom:10px;}
.splash-logo span{color:var(--sakura-deep);}
.splash-sub{font-size:17px; color:var(--ink-soft); font-weight:500; margin-bottom:56px;}
.splash .btn{margin-top:8px; min-width:220px;}

.onboard{
  align-items:center;
  justify-content:center;
  padding:32px;
  text-align:center;
  position:relative;
  z-index:1;
}
.onboard-emoji{font-size:56px; margin-bottom:24px;}
.onboard-title{font-family:var(--font-display); font-size:28px; font-weight:700; margin-bottom:12px; line-height:1.35;}
.onboard-desc{font-size:16px; color:var(--ink-soft); margin-bottom:36px; line-height:1.5;}
.onboard-input{
  width:100%;
  max-width:320px;
  padding:18px 24px;
  border-radius:999px;
  border:2px solid var(--cream-deep);
  background:var(--white);
  font-size:18px;
  font-weight:600;
  text-align:center;
  color:var(--ink);
  margin-bottom:28px;
  transition:border-color 0.2s ease;
}
.onboard-input:focus{outline:none; border-color:var(--sakura);}
.onboard-input::placeholder{color:var(--ink-faint); font-weight:500;}
.onboard .btn{min-width:220px;}

.topbar{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:18px 20px 8px;
  position:relative;
  z-index:1;
}
.topbar-back{
  width:42px; height:42px;
  border-radius:50%;
  background:var(--white);
  display:flex; align-items:center; justify-content:center;
  box-shadow:var(--shadow-card);
  font-size:18px;
  color:var(--ink-soft);
}
.topbar-title{font-family:var(--font-display); font-weight:700; font-size:20px;}
.topbar-spacer{width:42px;}

.home{padding:8px 20px 100px; position:relative; z-index:1;}
.home-greet{margin:18px 0 6px;}
.home-greet-text{font-family:var(--font-display); font-size:26px; font-weight:700; line-height:1.3;}
.home-greet-sub{font-size:15px; color:var(--ink-soft); margin-top:4px; font-weight:500;}
.stats-row{display:grid; grid-template-columns:1fr 1fr; gap:12px; margin:22px 0;}
.stat-card{background:var(--white); border-radius:var(--r-md); padding:18px 16px; box-shadow:var(--shadow-card); text-align:center;}
.stat-emoji{font-size:26px; margin-bottom:6px;}
.stat-value{font-size:24px; font-weight:800; color:var(--ink);}
.stat-label{font-size:12px; color:var(--ink-soft); font-weight:600; margin-top:2px;}

.next-dest{
  background:linear-gradient(135deg, #FFF8F0, var(--white));
  border-radius:var(--r-lg);
  padding:20px;
  box-shadow:var(--shadow-card);
  margin-bottom:24px;
  display:flex;
  align-items:center;
  gap:16px;
}
.next-dest-emoji{font-size:38px;}
.next-dest-label{font-size:12px; font-weight:700; color:var(--ink-faint); text-transform:uppercase; letter-spacing:0.05em;}
.next-dest-name{font-family:var(--font-display); font-size:19px; font-weight:700; margin-top:2px;}
.next-dest-progress{margin-top:8px; height:8px; background:var(--cream-deep); border-radius:999px; overflow:hidden;}
.next-dest-progress-fill{height:100%; background:linear-gradient(90deg, var(--sakura), var(--sakura-deep)); border-radius:999px; transition:width 0.6s cubic-bezier(0.16,1,0.3,1);}

.section-label{font-family:var(--font-body); font-weight:700; font-size:15px; color:var(--ink); margin:8px 0 14px;}
.theme-scroll{
  display:flex;
  gap:14px;
  overflow-x:auto;
  padding-bottom:8px;
  margin:0 -20px;
  padding-left:20px;
  padding-right:20px;
}
.theme-card{
  flex:0 0 auto;
  width:148px;
  background:var(--white);
  border-radius:var(--r-md);
  padding:20px 16px;
  box-shadow:var(--shadow-card);
  text-align:center;
  position:relative;
  transition:transform 0.15s ease;
}
.theme-card:active{transform:scale(0.95);}
.theme-card.locked{opacity:0.55;}
.theme-card-emoji{font-size:36px; margin-bottom:10px;}
.theme-card-name{font-size:14px; font-weight:700; line-height:1.3;}
.theme-card-meta{font-size:11px; color:var(--ink-soft); margin-top:4px; font-weight:600;}
.theme-card-lock{position:absolute; top:10px; right:10px; font-size:14px;}

.bottom-nav{
  position:fixed;
  bottom:0; left:0; right:0;
  max-width:480px;
  margin:0 auto;
  background:rgba(255,255,255,0.92);
  backdrop-filter:blur(12px);
  display:flex;
  justify-content:space-around;
  padding:10px 8px calc(10px + env(safe-area-inset-bottom));
  box-shadow:0 -2px 16px rgba(58,51,46,0.07);
  z-index:10;
}
.nav-item{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:3px;
  padding:6px 18px;
  border-radius:16px;
  color:var(--ink-faint);
  font-size:11px;
  font-weight:600;
  transition:color 0.2s ease;
}
.nav-item.active{color:var(--sakura-deep);}
.nav-item-icon{font-size:21px;}

.themes-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px;
  padding:8px 20px 40px;
  position:relative;
  z-index:1;
}
.theme-tile{
  background:var(--white);
  border-radius:var(--r-lg);
  padding:24px 16px;
  text-align:center;
  box-shadow:var(--shadow-card);
  position:relative;
  transition:transform 0.15s ease;
}
.theme-tile:active{transform:scale(0.95);}
.theme-tile.locked{opacity:0.5;}
.theme-tile-emoji{font-size:42px; margin-bottom:12px;}
.theme-tile-name{font-family:var(--font-display); font-size:17px; font-weight:700;}
.theme-tile-count{font-size:12px; color:var(--ink-soft); margin-top:6px; font-weight:600;}
.theme-tile-lockbadge{
  margin-top:8px;
  font-size:11px;
  font-weight:700;
  color:var(--sakura-deep);
  background:#FFF0F3;
  border-radius:999px;
  padding:4px 10px;
  display:inline-block;
}

/* ============================================
   TELA MATCH — AJUSTADA
   ============================================ */
.match-screen{
  padding:0 18px 24px;
  position:relative;
  z-index:1;
  display:flex;
  flex-direction:column;
  flex:1;
}
.match-progress{display:flex; align-items:center; gap:10px; padding:14px 2px 18px;}
.match-progress-track{flex:1; height:10px; background:var(--cream-deep); border-radius:999px; overflow:hidden;}
.match-progress-fill{height:100%; background:linear-gradient(90deg, var(--sage), var(--sage-deep)); border-radius:999px; transition:width 0.5s cubic-bezier(0.16,1,0.3,1);}
.match-progress-count{font-size:13px; font-weight:700; color:var(--ink-soft); white-space:nowrap;}
.match-close{
  width:38px; height:38px;
  border-radius:50%;
  background:var(--white);
  box-shadow:var(--shadow-card);
  display:flex; align-items:center; justify-content:center;
  font-size:16px;
  color:var(--ink-soft);
}

.match-board{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px;
  flex:1;
  align-content:start;
}
.match-col{display:flex; flex-direction:column; gap:12px;}

.match-card{
  background:var(--white);
  border-radius:26px;
  padding:16px 12px;
  box-shadow:var(--shadow-card);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  min-height:112px;
  height:112px;
  position:relative;
  transition:transform 0.18s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.18s ease, background 0.2s ease, opacity 0.3s ease;
  border:2px solid transparent;
  overflow:hidden;
}

.match-card.kr{
  font-family:var(--font-display);
  font-weight:700;
  gap:8px;
  line-height:1.15;
  word-break:keep-all;
  overflow-wrap:normal;
  line-break:strict;
  hyphens:none;
  text-wrap:balance;
  padding-left:6px;
  padding-right:6px;
}
/* Tipografia adaptativa: o tamanho da fonte se ajusta ao comprimento do texto
   pra nunca quebrar sílabas Hangul no meio nem ultrapassar o card. */
.match-card.kr.kr-short{font-size:44px;}   /* até 3 caracteres */
.match-card.kr.kr-medium{font-size:38px;}  /* até 5 caracteres */
.match-card.kr.kr-long{font-size:32px;}    /* até 7 caracteres */
.match-card.kr.kr-phrase{font-size:25px; line-height:1.25;} /* frases, mais de 7 caracteres */

.match-card.pt{
  font-size:17px;
  font-weight:800;
  color:var(--ink);
  line-height:1.22;
  padding-left:10px;
  padding-right:10px;
  word-break:keep-all;
  overflow-wrap:break-word;
}

.match-card.kr:nth-child(1){background:#FFF0F4;}
.match-card.kr:nth-child(2){background:#FFF7D8;}
.match-card.kr:nth-child(3){background:#EEF7EA;}
.match-card.kr:nth-child(4){background:#EAF5FF;}
.match-card.kr:nth-child(5){background:#F3ECFF;}

.match-card:active:not(.matched):not(.disabled){transform:scale(0.94);}
.match-card.selected{
  border-color:var(--sakura-deep);
  box-shadow:var(--shadow-float);
  background:#FFF7F9;
}
.match-card.matched{
  background:var(--sage);
  border-color:var(--sage-deep);
  color:var(--white);
  opacity:0;
  pointer-events:none;
  transform:scale(0.85);
}
.match-card.wrong{animation:shakeCard 0.4s ease;}
@keyframes shakeCard{0%,100%{transform:translateX(0);} 25%{transform:translateX(-6px);} 75%{transform:translateX(6px);}}

.match-card-audio{
  width:34px;
  height:34px;
  border-radius:50%;
  background:linear-gradient(135deg, var(--sakura-deep), var(--peach));
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:14px;
  font-family:var(--font-body);
  font-weight:800;
  line-height:1;
  box-shadow:0 4px 10px rgba(232,136,154,0.25);
  flex-shrink:0;
}

.match-feedback{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%) scale(0.8);
  background:var(--white);
  padding:16px 22px;
  border-radius:24px;
  box-shadow:var(--shadow-float);
  font-size:16px;
  font-weight:700;
  color:var(--ink);
  opacity:0;
  pointer-events:none;
  z-index:50;
  transition:opacity 0.25s ease, transform 0.25s ease;
  max-width:calc(100vw - 40px);
  width:auto;
  white-space:normal;
  text-align:center;
  line-height:1.35;
}
.match-feedback.show{opacity:1; transform:translate(-50%,-50%) scale(1);}

.burst-petal{
  position:fixed;
  font-size:20px;
  pointer-events:none;
  z-index:49;
  animation:burstOut 0.7s cubic-bezier(0.16,1,0.3,1) forwards;
}
@keyframes burstOut{0%{transform:translate(0,0) scale(0.6) rotate(0deg); opacity:1;} 100%{transform:translate(var(--bx,0px), var(--by,-80px)) scale(1.1) rotate(180deg); opacity:0;}}

.complete-screen{
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:32px;
  position:relative;
  z-index:1;
}
.complete-emoji{font-size:72px; margin-bottom:18px; animation:completePop 0.6s cubic-bezier(0.34,1.56,0.64,1);}
@keyframes completePop{0%{transform:scale(0); opacity:0;} 60%{transform:scale(1.15);} 100%{transform:scale(1); opacity:1;}}
.complete-title{font-family:var(--font-display); font-size:26px; font-weight:700; margin-bottom:10px;}
.complete-desc{font-size:16px; color:var(--ink-soft); margin-bottom:28px; line-height:1.5;}
.complete-flowers{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  font-family:var(--font-display);
  font-size:22px;
  font-weight:700;
  color:var(--sakura-deep);
  background:#FFF0F3;
  padding:14px 26px;
  border-radius:999px;
  margin-bottom:32px;
}
.complete-words{display:flex; flex-wrap:wrap; gap:10px; justify-content:center; margin-bottom:32px; max-width:340px;}
.complete-word-chip{
  background:var(--white);
  border-radius:999px;
  padding:8px 16px;
  font-size:13px;
  font-weight:600;
  box-shadow:var(--shadow-card);
  display:flex;
  align-items:center;
  gap:6px;
}
.complete-word-chip .kr{font-family:var(--font-display); font-weight:700;}
.complete .btn{min-width:240px;}
.complete-unlock-banner{
  background:linear-gradient(135deg, var(--gold), var(--peach));
  color:var(--white);
  padding:16px 22px;
  border-radius:var(--r-md);
  font-weight:700;
  margin-bottom:24px;
  box-shadow:var(--shadow-card);
}

.profile{padding:8px 20px 100px; position:relative; z-index:1;}
.profile-header{text-align:center; padding:24px 0 8px;}
.profile-avatar{
  width:84px; height:84px;
  border-radius:50%;
  background:linear-gradient(135deg, var(--sakura), var(--peach));
  display:flex; align-items:center; justify-content:center;
  font-size:36px;
  margin:0 auto 14px;
  box-shadow:var(--shadow-card);
}
.profile-name{font-family:var(--font-display); font-size:24px; font-weight:700;}
.profile-since{font-size:13px; color:var(--ink-soft); margin-top:4px; font-weight:500;}
.profile-stats{display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; margin:24px 0;}
.profile-stat{background:var(--white); border-radius:var(--r-md); padding:16px 8px; text-align:center; box-shadow:var(--shadow-card);}
.profile-stat-value{font-size:20px; font-weight:800;}
.profile-stat-label{font-size:10.5px; color:var(--ink-soft); font-weight:600; margin-top:3px; line-height:1.3;}

.collection-list{display:flex; flex-direction:column; gap:10px;}
.collection-row{background:var(--white); border-radius:var(--r-md); padding:16px; display:flex; align-items:center; gap:14px; box-shadow:var(--shadow-card);}
.collection-row.locked{opacity:0.5;}
.collection-emoji{font-size:26px;}
.collection-info{flex:1;}
.collection-name{font-weight:700; font-size:14px;}
.collection-progress-text{font-size:12px; color:var(--ink-soft); margin-top:2px; font-weight:500;}
.collection-bar{width:60px; height:6px; background:var(--cream-deep); border-radius:999px; overflow:hidden;}
.collection-bar-fill{height:100%; background:var(--sage-deep); border-radius:999px;}

.settings{padding:8px 20px 100px; position:relative; z-index:1;}
.settings-group{background:var(--white); border-radius:var(--r-md); box-shadow:var(--shadow-card); margin-bottom:18px; overflow:hidden;}
.settings-row{display:flex; align-items:center; justify-content:space-between; padding:18px 18px; border-bottom:1px solid var(--cream-deep);}
.settings-row:last-child{border-bottom:none;}
.settings-row-label{font-size:15px; font-weight:600;}
.settings-row-desc{font-size:12px; color:var(--ink-soft); margin-top:2px; font-weight:500;}

.toggle{
  width:50px; height:30px;
  border-radius:999px;
  background:var(--cream-deep);
  position:relative;
  transition:background 0.2s ease;
  flex-shrink:0;
}
.toggle.on{background:var(--sage-deep);}
.toggle-knob{
  width:24px; height:24px;
  border-radius:50%;
  background:var(--white);
  position:absolute;
  top:3px; left:3px;
  box-shadow:0 1px 4px rgba(0,0,0,0.15);
  transition:transform 0.2s cubic-bezier(0.34,1.56,0.64,1);
}
.toggle.on .toggle-knob{transform:translateX(20px);}
.danger-text{color:var(--peach); font-weight:700;}

.modal-overlay{
  position:fixed;
  inset:0;
  background:rgba(58,51,46,0.4);
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:100;
  padding:24px;
  opacity:0;
  pointer-events:none;
  transition:opacity 0.25s ease;
}
.modal-overlay.show{opacity:1; pointer-events:auto;}
.modal-box{
  background:var(--white);
  border-radius:var(--r-lg);

const STORAGE_KEY = 'oicoreia_state_v1';

function defaultState(){
  return {
    name: '',
    onboarded: false,
    flowers: 0,
    learnedWords: [],
    themeProgress: {},
    soundOn: true,
    doramaMode: false,
    doramaFavorites: {
      cloy:true,
      vincenzo:true,
      alchemy:true,
      woowoo:true,
      kingland:true,
      business:true
    },
    isPlus: false, // Oi Coreia Plus — pagamento único, sem assinatura. Ver PLUS_INFO mais abaixo.
    createdAt: Date.now(),
    lastSession: null,
  };
}

function loadState(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) return defaultState();
    const parsed = JSON.parse(raw);
    return Object.assign(defaultState(), parsed);
  }catch(e){
    console.warn('Não foi possível ler o progresso salvo, iniciando do zero.', e);
    return defaultState();
  }
}

function saveState(){
  try{
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  }catch(e){
    console.warn('Não foi possível salvar o progresso.', e);
  }
}

let state = loadState();

function totalWordsLearned(){ return state.learnedWords.length; }
function isThemeUnlocked(theme){ return state.flowers >= theme.unlockFlowers; }
function themeLearnedCount(themeId){
  const theme = findThemeById(themeId);
  if(!theme) return 0;
  return theme.words.filter(([kr]) => state.learnedWords.includes(themeId+'::'+kr)).length;
}
function nextLockedTheme(){ return THEMES.find(t => !isThemeUnlocked(t) && !t.plus) || null; }
function markWordLearned(themeId, kr){
  const key = themeId+'::'+kr;
  if(!state.learnedWords.includes(key)) state.learnedWords.push(key);
}
function addFlowers(n){ state.flowers += n; }

// ============================================
// OI COREIA PLUS — gating de conteúdo pago
// Pagamento único vitalício, sem assinatura. state.isPlus é a fonte de verdade local.
// IMPORTANTE: hoje isPlus é ativado por um botão de simulação (ver renderPlusScreen).
// Numa versão publicada de verdade, troque activatePlusMock() pela confirmação real
// de compra (Google Play Billing / App Store / Stripe) antes de setar state.isPlus=true.
// ============================================
function isPlusLocked(item){
  return !!(item && item.plus && !state.isPlus);
}
function isThemeAccessible(theme){
  // Acessível só se desbloqueado por flores E (não é conteúdo Plus OU já é assinante Plus).
  return isThemeUnlocked(theme) && !isPlusLocked(theme);
}

let koreanVoice = null;
function pickKoreanVoice(){
  if(!('speechSynthesis' in window)) return;
  const voices = window.speechSynthesis.getVoices();
  koreanVoice = voices.find(v => v.lang === 'ko-KR') || voices.find(v => v.lang && v.lang.startsWith('ko')) || null;
}
if('speechSynthesis' in window){
  pickKoreanVoice();
  window.speechSynthesis.onvoiceschanged = pickKoreanVoice;
}

function speakKorean(text){
  if(!state.soundOn) return;
  if(!('speechSynthesis' in window)){
    showToast('Seu navegador não suporta áudio de voz.');
    return;
  }
  try{
    window.speechSynthesis.cancel();
    const utter = new SpeechSynthesisUtterance(text);
    utter.lang = 'ko-KR';
    if(koreanVoice) utter.voice = koreanVoice;
    utter.rate = 0.85;
    window.speechSynthesis.speak(utter);
  }catch(e){
    console.warn('Erro ao reproduzir áudio', e);
  }
}

let toastTimer = null;
function showToast(msg){
  let toast = document.getElementById('toastEl');
  if(!toast){
    toast = document.createElement('div');
    toast.id = 'toastEl';
    toast.className = 'toast';
    document.body.appendChild(toast);
  }
  toast.textContent = msg;
  toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=> toast.classList.remove('show'), 2200);
}

const app = document.getElementById('app');
let currentMatchSession = null;

function render(){
  saveState();
  const finalRoute = state.onboarded ? (window.__route || 'home') : (window.__route || 'splash');
  app.innerHTML = '';
  switch(finalRoute){
    case 'splash': renderSplash(); break;
    case 'onboard': renderOnboard(); break;
    case 'home': renderHome(); break;
    case 'train': renderTrainScreen(); break;
    case 'plus': renderPlusScreen(); break;
    case 'themes': renderThemesScreen(); break;
    case 'quickgame': renderQuickGame(); break;
    case 'infinite': renderInfiniteMatch(); break;
    case 'match': renderMatchScreen(); break;
    case 'complete': renderCompleteScreen(); break;
    case 'profile': renderProfile(); break;
    case 'settings': renderSettings(); break;
    default: renderHome();
  }
}

function goTo(route, params){
  if(route !== 'quickgame') stopQuickTimer();
  window.__route = route;
  window.__routeParams = params || {};
  render();
  window.scrollTo(0,0);
}

function renderOnboard(){
  const el = document.createElement('div');

  if(!state.name){
    el.innerHTML = `
      <div class="onboard-emoji">👋</div>
      <div class="onboard-title">Qual é o seu nome?</div>
      <div class="onboard-desc korean" style="margin-bottom:20px;">이름이 뭐예요?</div>

      <button class="btn btn-primary" id="btnNameNext">Continuar</button>
    `;
    app.appendChild(el);
    const input = el.querySelector('#nameInput');
    setTimeout(()=> input.focus(), 350);
    const submit = ()=>{
      const val = input.value.trim();
      if(!val){
        input.style.borderColor = 'var(--peach)';
        return;
      }
      state.name = val;
      saveState();
      render();

    el.querySelector('#btnNameNext').addEventListener('click', submit);

  } else {
    el.innerHTML = `

      <div class="onboard-title">안녕하세요, ${escapeHtml(state.name)} 🌸</div>

function shuffleArray(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

const ROUND_SIZE = 20;

function startMatchSession(themeId){
  const theme = findThemeById(themeId);
  if(!theme) return;

  // Camada central de proteção: mesmo que algum botão futuro chame startMatchSession
  // direto, conteúdo Plus nunca inicia sessão sem state.isPlus.
  if(isPlusLocked(theme)){
    goTo('plus', {from: window.__route || 'train'});
    return;
  }

  const pool = shuffleArray(theme.words);
  const roundWords = pool.slice(0, Math.min(ROUND_SIZE, theme.words.length));

  currentMatchSession = {
    themeId,
    themeName: theme.name,
    themeEmoji: theme.emoji,
    totalGoal: roundWords.length,
    queue: roundWords.slice(5),
    pairs: roundWords.slice(0, 5),
    matchedKr: [],
    selectedKr: null,
    selectedPt: null,
    flowersEarned: 0,
    wordsLearnedThisRound: [],
  };

  goTo('match');
}


// Escolhe a classe de tamanho de fonte com base no comprimento da palavra/frase coreana.
// Usa Array.from para contar caracteres Unicode corretamente (não bytes).
function krSizeClass(kr){
  const len = Array.from(kr.replace(/\s/g,'')).length;
  if(len <= 3) return 'kr-short';
  if(len <= 5) return 'kr-medium';
  if(len <= 7) return 'kr-long';
  return 'kr-phrase';
}

function makeMatchKrCard(kr){
  const card = document.createElement('button');
  card.className = 'match-card kr fade-in ' + krSizeClass(kr);
  card.dataset.kr = kr;
  const audioIcon = state.soundOn ? `<span class="match-card-audio">▶</span>` : '';
  card.innerHTML = `<span>${escapeHtml(kr)}</span>${audioIcon}`;
  card.addEventListener('click', ()=> onSelectKr(kr, card));
  return card;
}

function makeMatchPtCard(kr, pt){
  const card = document.createElement('button');
  card.className = 'match-card pt fade-in';
  card.dataset.pt = pt;
  card.dataset.forKr = kr;
  card.textContent = pt;
  card.addEventListener('click', ()=> onSelectPt(pt, kr, card));
  return card;
}

function addNextMatchPair(krCard, ptCard, resolvedKr){
  const session = currentMatchSession;
  if(!session) return;

  // Remove o par recém-resolvido da lista de pares visíveis (fonte de verdade),
  // ou a lógica de match quebra a partir da segunda reposição.
  if(resolvedKr){
    const idx = session.pairs.findIndex(p => p[0] === resolvedKr);
    if(idx !== -1) session.pairs.splice(idx, 1);
  }

  if(!session.queue || session.queue.length === 0) return;
  const nextPair = session.queue.shift();
  const [newKr, newPt] = nextPair;
  session.pairs.push([newKr, newPt]);

  // Os dois cards novos (coreano e português) NUNCA devem entrar no mesmo instante visual.
  // Se entrarem juntos, dá pra "ver" qual par é o novo só pelo sincronismo, sem precisar
  // ler nada — então cada lado recebe seu próprio atraso aleatório e independente,
  // com uma diferença mínima forçada entre os dois. A janela é curta de propósito:
  // o objetivo é um fluxo rápido e contínuo (estilo Match Madness do Duolingo), não uma pausa.
  const baseDelay = 40 + Math.floor(Math.random()*60); // 40–100ms
  const minGap = 35; // garante que os dois lados nunca entrem juntos, mesmo por coincidência
  const krFirst = Math.random() < 0.5; // varia quem entra primeiro a cada rodada
  const krDelay = krFirst ? baseDelay : baseDelay + minGap;
  const ptDelay = krFirst ? baseDelay + minGap : baseDelay;

  if(krCard){
    krCard.classList.add('fade-out');
    setTimeout(()=>{
      const newKrCard = makeMatchKrCard(newKr);
      krCard.replaceWith(newKrCard);
      randomizeCardPosition(newKrCard);
    }, krDelay);
  }
  if(ptCard){
    ptCard.classList.add('fade-out');
    setTimeout(()=>{
      const newPtCard = makeMatchPtCard(newKr, newPt);
      ptCard.replaceWith(newPtCard);
      randomizeCardPosition(newPtCard);
    }, ptDelay);
  }
}

// Move um card recém-inserido para uma posição aleatória dentro da sua própria coluna,
// quebrando a correlação posicional entre o lado coreano e o lado português.
function randomizeCardPosition(cardEl){
  const col = cardEl.parentElement;
  if(!col) return;
  const siblings = Array.from(col.children).filter(c => c !== cardEl);
  if(siblings.length === 0) return;
  const targetIndex = Math.floor(Math.random() * (siblings.length + 1));
  if(targetIndex >= siblings.length){
    col.appendChild(cardEl);
  } else {
    col.insertBefore(cardEl, siblings[targetIndex]);
  }
}


function renderMatchScreen(){
  const session = currentMatchSession;
  if(!session){ goTo('home'); return; }

  const el = document.createElement('div');
  el.className = 'screen match-screen';

  const totalPairs = session.totalGoal || session.pairs.length;
  const doneCount = session.matchedKr.length;
  const progressPct = Math.round((doneCount/totalPairs)*100);

  el.innerHTML = `
    <div class="match-progress">
      <button class="match-close" id="matchClose">✕</button>
      <div class="match-progress-track"><div class="match-progress-fill" style="width:${progressPct}%"></div></div>
      <div class="match-progress-count">${doneCount}/${totalPairs}</div>
    </div>
    <div class="match-board">
      <div class="match-col" id="colKr"></div>
      <div class="match-col" id="colPt"></div>
    </div>
  `;
  app.appendChild(el);

  el.querySelector('#matchClose').addEventListener('click', ()=>{
    currentMatchSession = null;
    goTo('home');
  });

  const colKr = el.querySelector('#colKr');
  const colPt = el.querySelector('#colPt');

  const shuffledKr = shuffleArray(session.pairs.map(p=>p[0]));

  shuffledKr.forEach(kr=>{
    colKr.appendChild(makeMatchKrCard(kr));
  });

  session.pairs.forEach(([kr, pt])=>{
    colPt.appendChild(makeMatchPtCard(kr, pt));
  });

  shuffleDomChildren(colPt);
}

function shuffleDomChildren(container){
  const children = Array.from(container.children);
  shuffleArray(children).forEach(c => container.appendChild(c));
}

function onSelectKr(kr, cardEl){
  const session = currentMatchSession;
  if(!session) return;
  // Blindagem: ignora cliques em um card que já está saindo da tela ou que não
  // está mais conectado ao DOM (pode acontecer numa janela muito curta durante a troca rápida de pares).
  if(!cardEl.isConnected || cardEl.classList.contains('fade-out')) return;
  document.querySelectorAll('.match-card.kr.selected').forEach(c=>c.classList.remove('selected'));
  cardEl.classList.add('selected');
  session.selectedKr = kr;
  speakKorean(kr);
  tryResolveMatch();
}

function onSelectPt(pt, forKr, cardEl){
  const session = currentMatchSession;
  if(!session) return;
  if(!cardEl.isConnected || cardEl.classList.contains('fade-out')) return;
  document.querySelectorAll('.match-card.pt.selected').forEach(c=>c.classList.remove('selected'));
  cardEl.classList.add('selected');
  session.selectedPt = pt;
  session.selectedPtForKr = forKr;
  tryResolveMatch();
}

function tryResolveMatch(){
  const session = currentMatchSession;
  if(!session.selectedKr || !session.selectedPt) return;

  const correctPair = session.pairs.find(p => p[0] === session.selectedKr);
  const isCorrect = correctPair && correctPair[1] === session.selectedPt;

  const krCard = document.querySelector(`.match-card.kr[data-kr="${cssEscape(session.selectedKr)}"]`);
  const ptCard = document.querySelector(`.match-card.pt.selected`);

  if(isCorrect) handleCorrectMatch(session, krCard, ptCard);
  else handleWrongMatch(krCard, ptCard);

  session.selectedKr = null;
  session.selectedPt = null;
}

function cssEscape(str){
  if(window.CSS && CSS.escape) return CSS.escape(str);
  return str.replace(/[^a-zA-Z0-9_\u00A0-\uFFFF-]/g, '\\$&');
}

function handleCorrectMatch(session, krCard, ptCard){
  const kr = session.selectedKr;
  session.matchedKr.push(kr);
  markWordLearned(session.themeId, kr);
  if(!session.wordsLearnedThisRound.includes(kr)) session.wordsLearnedThisRound.push(kr);

  burstPetalsFrom(krCard);
  showMatchFeedback(randomPhrase(themedCorrectPhrase(session.themeId)));

  if(krCard) krCard.classList.add('matched');
  if(ptCard) ptCard.classList.add('matched');

  addFlowers(2);
  session.flowersEarned += 2;
  saveState();

  setTimeout(()=>{
    updateMatchProgressBar();
    if(session.matchedKr.length >= (session.totalGoal || session.pairs.length)){
      finishMatchSession();
    } else if(session.queue && session.queue.length > 0){
      addNextMatchPair(krCard, ptCard, kr);
    } else {
      // não há mais palavras na fila: apenas remove o par resolvido da lista,
      // o card já está com opacity 0 (.matched) e some visualmente.
      const idx = session.pairs.findIndex(p => p[0] === kr);
      if(idx !== -1) session.pairs.splice(idx, 1);
    }
  }, 260);
}

function handleWrongMatch(krCard, ptCard){
  showMatchFeedback(PHRASE_WRONG);
  [krCard, ptCard].forEach(c=>{
    if(!c) return;
    c.classList.remove('selected');
    c.classList.add('wrong');
    setTimeout(()=> c.classList.remove('wrong'), 420);
  });
}

function updateMatchProgressBar(){
  const session = currentMatchSession;
  const fill = document.querySelector('.match-progress-fill');
  const count = document.querySelector('.match-progress-count');
  if(fill) fill.style.width = Math.round((session.matchedKr.length/(session.totalGoal || session.pairs.length))*100)+'%';
  if(count) count.textContent = `${session.matchedKr.length}/${session.totalGoal || session.pairs.length}`;
}

function randomPhrase(arr){ return arr[Math.floor(Math.random()*arr.length)]; }

let feedbackTimer = null;
function showMatchFeedback(text){
  let fb = document.querySelector('.match-feedback');
  if(!fb){
    fb = document.createElement('div');
    fb.className = 'match-feedback';
    document.body.appendChild(fb);
  }
  fb.textContent = text;
  fb.classList.add('show');
  clearTimeout(feedbackTimer);
  feedbackTimer = setTimeout(()=> fb.classList.remove('show'), 1300);
}

function burstPetalsFrom(el){
  if(!el) return;
  const rect = el.getBoundingClientRect();
  const cx = rect.left + rect.width/2;
  const cy = rect.top + rect.height/2;
  const emojis = ['🌸','✨','🌷'];
  for(let i=0;i<6;i++){
    const p = document.createElement('div');
    p.className = 'burst-petal';
    p.textContent = emojis[Math.floor(Math.random()*emojis.length)];
    p.style.left = cx+'px';
    p.style.top = cy+'px';
    const angle = (Math.random()*Math.PI*2);
    const dist = 50 + Math.random()*50;
    p.style.setProperty('--bx', (Math.cos(angle)*dist)+'px');
    p.style.setProperty('--by', (Math.sin(angle)*dist - 40)+'px');
    document.body.appendChild(p);
    setTimeout(()=> p.remove(), 750);
  }
}

function finishMatchSession(){ goTo('complete'); }

let quickGame = null;
let quickTimer = null;

function allWordsFlat(){
  const items = [];
  visibleThemeList().forEach(theme=>{
    theme.words.forEach(([kr, pt])=>{
      items.push({kr, pt, themeId:theme.id, themeName:theme.name, emoji:theme.emoji, dorama:!!theme.dorama});
    });
  });
  return items;
}

function startQuickGame(){
  quickGame = {
    active:true,
    score:0,
    round:0,
    timeLimit:10000,
    timeLeft:10000,
    current:null,
    options:[],
    best:Number(localStorage.getItem('oicoreia_quick_best') || 0)
  };
  nextQuickQuestion();
}

function stopQuickTimer(){
  if(quickTimer){
    clearInterval(quickTimer);
    quickTimer = null;
  }
}

function nextQuickQuestion(){
  stopQuickTimer();
  if(!quickGame) return;

  const pool = allWordsFlat();
  const current = pool[Math.floor(Math.random()*pool.length)];
  const wrongs = shuffleArray(pool.filter(item => item.pt !== current.pt)).slice(0,3);
  const options = shuffleArray([current, ...wrongs]);

  quickGame.current = current;
  quickGame.options = options;
  quickGame.round += 1;
  quickGame.timeLimit = 10000;
  quickGame.timeLeft = quickGame.timeLimit;

  window.__route = 'quickgame';
  render();

  const startedAt = Date.now();
  quickTimer = setInterval(()=>{
    if(!quickGame || !quickGame.active){
      stopQuickTimer();
      return;
    }
    quickGame.timeLeft = Math.max(0, quickGame.timeLimit - (Date.now() - startedAt));
    const fill = document.querySelector('.quick-timer-fill');
    if(fill){
      fill.style.width = Math.max(0, (quickGame.timeLeft / quickGame.timeLimit) * 100) + '%';
    }
    if(quickGame.timeLeft <= 0){
      finishQuickGame();
    }
  }, 80);
}

function finishQuickGame(){
  stopQuickTimer();
  if(!quickGame) return;
  quickGame.active = false;
  const best = Number(localStorage.getItem('oicoreia_quick_best') || 0);
  if(quickGame.score > best){
    localStorage.setItem('oicoreia_quick_best', String(quickGame.score));
    quickGame.best = quickGame.score;
  } else {
    quickGame.best = best;
  }
  render();
}

function chooseQuickOption(pt, btn){
  if(!quickGame || !quickGame.active) return;
  const correct = quickGame.current && pt === quickGame.current.pt;

  if(correct){
    if(btn) btn.classList.add('correct');
    quickGame.score += 1;
    speakKorean(quickGame.current.kr);
    setTimeout(()=> nextQuickQuestion(), 180);
  } else {
    if(btn) btn.classList.add('wrong');
    document.querySelectorAll('.quick-option').forEach(option=>{
      if(option.dataset.pt === quickGame.current.pt) option.classList.add('correct');
    });
    setTimeout(()=> finishQuickGame(), 450);
  }
}

let infiniteGame = null;

function getWordsByLevel(level){
  const all = allWordsFlat();
  if(level === 'beginner'){
    return all.filter(w => w.kr.length <= 5 && w.pt.length <= 18);
  }
  if(level === 'intermediate'){
    return all.filter(w => w.kr.length <= 9);
  }
  return all;
}

function startInfiniteMatch(level){
  const pool = shuffleArray(getWordsByLevel(level || 'beginner'));
  infiniteGame = {
    active:true,
    level:level || 'beginner',
    pool,
    index:0,
    pairs:[],
    selectedKr:null,
    selectedPt:null,
    hits:0,
    misses:0,
    combo:0,
    maxCombo:0,
    lives:3,
    gameOver:false,
    best:Number(localStorage.getItem('oicoreia_infinite_best') || 0),
    bestCombo:Number(localStorage.getItem('oicoreia_infinite_best_combo') || 0)
  };
  for(let i=0;i<5;i++) addInfinitePair();
  goTo('infinite');
}

function addInfinitePair(){
  if(!infiniteGame) return;
  if(infiniteGame.index >= infiniteGame.pool.length){
    infiniteGame.pool = shuffleArray(getWordsByLevel(infiniteGame.level));
    infiniteGame.index = 0;
  }
  const next = infiniteGame.pool[infiniteGame.index++];
  if(next && !infiniteGame.pairs.some(p => p.kr === next.kr)){
    infiniteGame.pairs.push(next);
  } else if(next){
    addInfinitePair();
  }
}


function renderLives(lives){
  const full = Math.max(0, lives || 0);
  return '❤️'.repeat(full) + '🤍'.repeat(Math.max(0, 3 - full));
}

function showInfiniteErrorToast(text){
  let toast = document.getElementById('infiniteErrorToast');
  if(!toast){
    toast = document.createElement('div');
    toast.id = 'infiniteErrorToast';
    toast.className = 'infinite-error-toast';
    document.body.appendChild(toast);
  }
  toast.textContent = text;
  toast.classList.add('show');
  clearTimeout(window.__infiniteErrorTimer);
  window.__infiniteErrorTimer = setTimeout(()=>toast.classList.remove('show'), 900);
}

function finishInfiniteGame(){
  if(!infiniteGame) return;
  infiniteGame.active = false;
  infiniteGame.gameOver = true;
  if(infiniteGame.hits > Number(localStorage.getItem('oicoreia_infinite_best') || 0)){
    localStorage.setItem('oicoreia_infinite_best', String(infiniteGame.hits));
  }
  if((infiniteGame.maxCombo || 0) > Number(localStorage.getItem('oicoreia_infinite_best_combo') || 0)){
    localStorage.setItem('oicoreia_infinite_best_combo', String(infiniteGame.maxCombo || 0));
  }
  render();
}

function selectInfiniteKr(kr, btn){
  if(!infiniteGame) return;
  document.querySelectorAll('.infinite-card.kr.selected').forEach(c=>c.classList.remove('selected'));
  btn.classList.add('selected');
  infiniteGame.selectedKr = kr;
  speakKorean(kr);
  resolveInfinite();
}

function selectInfinitePt(pt, forKr, btn){
  if(!infiniteGame) return;
  document.querySelectorAll('.infinite-card.pt.selected').forEach(c=>c.classList.remove('selected'));
  btn.classList.add('selected');
  infiniteGame.selectedPt = pt;
  infiniteGame.selectedPtForKr = forKr;
  resolveInfinite();
}

function updateInfiniteStats(){
  if(!infiniteGame) return;
  const hits = document.getElementById('infHits');
  const combo = document.getElementById('infCombo');
  const lives = document.getElementById('infLives');
  if(hits) hits.textContent = infiniteGame.hits;
  if(combo) combo.textContent = infiniteGame.combo;
  if(lives) lives.textContent = renderLives(infiniteGame.lives);
}

function attachInfiniteCardEvents(root=document){
  root.querySelectorAll('.infinite-card.kr').forEach(btn=>{
    btn.onclick = ()=> selectInfiniteKr(btn.dataset.kr, btn);
  });
  root.querySelectorAll('.infinite-card.pt').forEach(btn=>{
    btn.onclick = ()=> selectInfinitePt(btn.dataset.pt, btn.dataset.forKr, btn);
  });
}

function makeInfiniteKrCard(item){
  const btn = document.createElement('button');
  btn.className = 'infinite-card kr fade-in ' + krSizeClass(item.kr);
  btn.dataset.kr = item.kr;
  const audioLabel = state.soundOn ? `<span class="infinite-small-audio">▶ ouvir</span>` : '';
  btn.innerHTML = `<span>${escapeHtml(item.kr)}</span>${audioLabel}`;
  btn.onclick = ()=> selectInfiniteKr(btn.dataset.kr, btn);
  return btn;
}

function makeInfinitePtCard(item){
  const btn = document.createElement('button');
  btn.className = 'infinite-card pt fade-in';
  btn.dataset.pt = item.pt;
  btn.dataset.forKr = item.kr;
  btn.textContent = item.pt;
  btn.onclick = ()=> selectInfinitePt(btn.dataset.pt, btn.dataset.forKr, btn);
  return btn;
}

function resolveInfinite(){
  if(!infiniteGame || !infiniteGame.selectedKr || !infiniteGame.selectedPt) return;

  const isCorrect = infiniteGame.selectedKr === infiniteGame.selectedPtForKr;
  const kr = infiniteGame.selectedKr;
  const pt = infiniteGame.selectedPt;
  const krCard = document.querySelector(`.infinite-card.kr[data-kr="${cssEscape(kr)}"]`);
  const ptCard = document.querySelector(`.infinite-card.pt[data-pt="${cssEscape(pt)}"]`);

  if(isCorrect){
    if(krCard) krCard.classList.add('correct');
    if(ptCard) ptCard.classList.add('correct');

    infiniteGame.hits += 1;
    infiniteGame.combo += 1;
    infiniteGame.maxCombo = Math.max(infiniteGame.maxCombo || 0, infiniteGame.combo);
    if(infiniteGame.combo > (infiniteGame.bestCombo || 0)){
      infiniteGame.bestCombo = infiniteGame.combo;
      localStorage.setItem('oicoreia_infinite_best_combo', String(infiniteGame.bestCombo));
    }
    if(infiniteGame.hits > infiniteGame.best){
      infiniteGame.best = infiniteGame.hits;
      localStorage.setItem('oicoreia_infinite_best', String(infiniteGame.best));
    }
    updateInfiniteStats();

    infiniteGame.pairs = infiniteGame.pairs.filter(p => p.kr !== kr);
    addInfinitePair();
    const newPair = infiniteGame.pairs[infiniteGame.pairs.length - 1];

    infiniteGame.selectedKr = null;
    infiniteGame.selectedPt = null;

    // Mesmo princípio do Match normal: fluxo rápido e contínuo, com os dois lados
    // entrando em instantes levemente diferentes pra não criar uma "dica" visual de sincronismo.
    if(krCard) krCard.classList.add('fade-out');
    if(ptCard) ptCard.classList.add('fade-out');

    const infBase = 40 + Math.floor(Math.random()*60); // 40–100ms
    const infGap = 35;
    const infKrFirst = Math.random() < 0.5;
    const infKrDelay = infKrFirst ? infBase : infBase + infGap;
    const infPtDelay = infKrFirst ? infBase + infGap : infBase;

    if(krCard && newPair){
      setTimeout(()=>{
        const newKr = makeInfiniteKrCard(newPair);
        krCard.replaceWith(newKr);
        randomizeCardPosition(newKr);
      }, infKrDelay);
    }
    if(ptCard && newPair){
      setTimeout(()=>{
        const newPt = makeInfinitePtCard(newPair);
        ptCard.replaceWith(newPt);
        randomizeCardPosition(newPt);
      }, infPtDelay);
    }

  } else {
    infiniteGame.misses += 1;
    infiniteGame.combo = 0;
    infiniteGame.lives = Math.max(0, (infiniteGame.lives || 0) - 1);
    updateInfiniteStats();

    showInfiniteErrorToast(infiniteGame.lives > 0 ? `Ops! ${infiniteGame.lives} vida(s) restantes` : 'Fim de jogo!');

    const livesPill = document.getElementById('infLivesPill');
    if(livesPill){
      livesPill.classList.remove('infinite-life-lost');
      void livesPill.offsetWidth;
      livesPill.classList.add('infinite-life-lost');
    }

    if(krCard) krCard.classList.add('wrong');
    if(ptCard) ptCard.classList.add('wrong');

    if(infiniteGame.lives <= 0){
      setTimeout(()=> finishInfiniteGame(), 650);
      return;
    }

    setTimeout(()=>{
      document.querySelectorAll('.infinite-card.selected,.infinite-card.wrong').forEach(c=>{
        c.classList.remove('selected','wrong');
      });
      infiniteGame.selectedKr = null;
      infiniteGame.selectedPt = null;
    }, 420);
  }
}

  overlay.innerHTML = `
    <div class="modal-box">
      <div class="modal-title">Alterar nome</div>
      <input type="text" class="onboard-input" id="renameInput" value="${escapeHtml(state.name)}" maxlength="20" style="margin-bottom:18px;">
      <div class="modal-actions">
        <button class="btn btn-secondary" id="cancelRename">Cancelar</button>
        <button class="btn btn-primary" id="confirmRename">Salvar</button>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);
  requestAnimationFrame(()=> overlay.classList.add('show'));
  const close = ()=>{ overlay.classList.remove('show'); setTimeout(()=>overlay.remove(), 250); };
  overlay.querySelector('#cancelRename').addEventListener('click', close);
  overlay.querySelector('#confirmRename').addEventListener('click', ()=>{
    const val = overlay.querySelector('#renameInput').value.trim();
    if(val){
      state.name = val;
      saveState();
      close();
      render();
    }
  });
}

function openResetModal(){
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `
    <div class="modal-box">
      <div class="modal-title">Reiniciar progresso?</div>
      <div class="modal-desc">Isso vai apagar todas as palavras aprendidas, flores e temas desbloqueados. Essa ação não pode ser desfeita.</div>
      <div class="modal-actions">
        <button class="btn btn-secondary" id="cancelReset">Cancelar</button>
        <button class="btn btn-primary" id="confirmReset" style="background:linear-gradient(135deg, var(--peach), var(--sakura-deep));">Reiniciar</button>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);
  requestAnimationFrame(()=> overlay.classList.add('show'));
  const close = ()=>{ overlay.classList.remove('show'); setTimeout(()=>overlay.remove(), 250); };
  overlay.querySelector('#cancelReset').addEventListener('click', close);
  overlay.querySelector('#confirmReset').addEventListener('click', ()=>{
    const keepName = state.name;
    state = defaultState();
    state.name = keepName;
    state.onboarded = true;
    saveState();
    close();
    showToast('Seu progresso foi reiniciado.');
    goTo('home');
  });
}

function init(){
  spawnPetalsBg();
  render();
}

init();
</script>
</body>
</html>
